<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Wavr</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0f;--sf:#111118;--s2:#1a1a24;--s3:#22222f;
  --br:#2a2a3a;--ac:#7c6aff;--ac2:#ff6a9b;--ac3:#6affce;
  --tx:#e8e8f0;--t2:#8888aa;--t3:#4a4a66;--on:#4ade80;--rd:#ff4a6a;
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);height:100dvh;overflow:hidden;}

/* ── AUTH */
#auth{display:flex;align-items:center;justify-content:center;height:100dvh;padding:16px;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a1030,var(--bg) 70%);}
.abox{background:var(--sf);border:1px solid var(--br);border-radius:24px;padding:40px 32px;width:100%;max-width:400px;}
.logo{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;
  background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.asub{color:var(--t2);font-size:14px;margin-bottom:28px;}
.tabs{display:flex;gap:4px;background:var(--s2);border-radius:8px;padding:4px;margin-bottom:22px;}
.tab{flex:1;padding:9px;border:none;background:transparent;color:var(--t2);font-size:14px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .15s;}
.tab.on{background:var(--s3);color:var(--tx);}
.fg{margin-bottom:13px;}
.fl{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);margin-bottom:6px;}
.fi{width:100%;padding:13px 16px;background:var(--s2);border:1px solid var(--br);border-radius:8px;
  color:var(--tx);font-family:'Space Mono',monospace;font-size:14px;outline:none;transition:border-color .15s;}
.fi:focus{border-color:var(--ac);}
.fi::placeholder{color:var(--t3);}
.bp{width:100%;padding:14px;background:linear-gradient(135deg,var(--ac),#5a4fd6);border:none;
  border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity .15s;}
.bp:active{opacity:.85;}.bp:disabled{opacity:.5;cursor:default;}
.err{color:var(--ac2);font-size:13px;margin-top:10px;text-align:center;min-height:18px;}

/* ── APP */
#app{display:none;height:100dvh;}
.layout{display:flex;height:100dvh;}

/* ── SIDEBAR */
.sb{width:300px;min-width:300px;background:var(--sf);border-right:1px solid var(--br);
  display:flex;flex-direction:column;height:100dvh;flex-shrink:0;}
.sbh{padding:16px 16px 13px;border-bottom:1px solid var(--br);}
.applogo{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;
  background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:11px;}
.urow{display:flex;align-items:center;gap:10px;}

/* ── AVATARS — ключевые стили */
.av{width:36px;height:36px;min-width:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:13px;font-weight:700;position:relative;overflow:hidden;flex-shrink:0;user-select:none;}
.av-lg{width:40px;height:40px;min-width:40px;font-size:14px;}
.av-xl{width:68px;height:68px;min-width:68px;font-size:22px;}
/* Индикатор онлайн */
.av-on::after{content:'';position:absolute;bottom:1px;right:1px;width:8px;height:8px;
  background:var(--on);border-radius:50%;border:2px solid var(--sf);z-index:2;}
/* Изображение внутри аватара */
.av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;z-index:1;}
.c0{background:#7c6aff22;color:var(--ac);}
.c1{background:#ff6a9b22;color:var(--ac2);}
.c2{background:#6affce22;color:var(--ac3);}
.c3{background:#ffaa6a22;color:#ffaa6a;}
.c4{background:#6ab8ff22;color:#6ab8ff;}

.uinf{flex:1;min-width:0;cursor:pointer;}
.uname{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.utag{font-size:12px;color:var(--t2);font-family:'Space Mono',monospace;}
.ib{width:32px;height:32px;min-width:32px;border-radius:8px;border:none;background:var(--s2);color:var(--t2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ib:active{background:var(--s3);}
.ib.dng:active{background:#ff4a6a22;color:var(--rd);}

.srw{padding:9px 13px;border-bottom:1px solid var(--br);}
.sbox-w{position:relative;}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;}
.sinp{width:100%;padding:9px 13px 9px 33px;background:var(--s2);border:1px solid var(--br);
  border-radius:8px;color:var(--tx);font-size:14px;outline:none;transition:border-color .15s;}
.sinp:focus{border-color:var(--ac);}
.sinp::placeholder{color:var(--t3);}

#sres{display:none;border-bottom:1px solid var(--br);max-height:240px;overflow-y:auto;}
.sri{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .1s;}
.sri:hover,.sri:active{background:var(--s2);}

.clabel{padding:9px 15px 4px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);}
.clist{flex:1;overflow-y:auto;padding:4px 5px;}
.clist::-webkit-scrollbar{width:0;}
.ci{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:8px;cursor:pointer;position:relative;transition:background .1s;}
.ci:hover,.ci.act{background:var(--s3);}
.ci.act::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:60%;background:var(--ac);border-radius:0 3px 3px 0;}
.cinf{flex:1;min-width:0;}
.cname{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cprev{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.cmeta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.ctime{font-size:11px;color:var(--t3);}
.badge{background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;min-width:18px;text-align:center;}
.cdel{background:transparent;border:none;color:var(--t3);cursor:pointer;padding:5px 3px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.ci:hover .cdel{opacity:1;}
.empty-list{padding:28px 14px;text-align:center;color:var(--t3);font-size:13px;line-height:1.6;}

/* ── CHAT */
.cmain{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{padding:12px 18px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:11px;background:var(--sf);flex-shrink:0;}
.tbinf{flex:1;cursor:pointer;min-width:0;}
.tbname{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tbst{font-size:12px;color:var(--t2);margin-top:1px;}
.marea{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;display:flex;flex-direction:column;gap:2px;
  overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}
.marea::-webkit-scrollbar{width:4px;}
.marea::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px;}
.dsep{text-align:center;font-size:11px;color:var(--t3);font-family:'Space Mono',monospace;margin:12px 0 5px;position:relative;}
.dsep::before,.dsep::after{content:'';position:absolute;top:50%;width:25%;height:1px;background:var(--br);}
.dsep::before{left:0;}.dsep::after{right:0;}

/* ── MESSAGES */
.mw{display:flex;gap:6px;max-width:80%;position:relative;animation:mIn .14s ease;}
.mw.me{align-self:flex-end;flex-direction:row-reverse;}

/* мини-аватар рядом с сообщением */
.mav{width:24px;height:24px;min-width:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;font-family:'Space Mono',monospace;flex-shrink:0;margin-top:auto;
  position:relative;overflow:hidden;user-select:none;}
.mav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;z-index:1;}

.bbl{padding:9px 12px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
.mw:not(.me) .bbl{background:var(--s2);border:1px solid var(--br);border-bottom-left-radius:4px;}
.mw.me .bbl{background:linear-gradient(135deg,var(--ac),#5a4fd6);color:#fff;border-bottom-right-radius:4px;}
.bbl.del{opacity:.5;font-style:italic;}
.mfoot{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px;}
.mtime{font-size:10px;opacity:.5;font-family:'Space Mono',monospace;}
.mtick{font-size:12px;line-height:1;}
.mtick.s{color:var(--t3);}.mtick.r{color:var(--ac3);}

/* ── КНОПКИ ДЕЙСТВИЙ — показываем через hover/show-acts */
.macts{display:none;flex-direction:column;gap:3px;align-self:flex-end;margin-bottom:4px;}
.mw:hover .macts,.mw.show-acts .macts{display:flex;}
.mab{width:28px;height:28px;min-width:28px;border-radius:8px;border:none;background:var(--s2);color:var(--t2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:background .1s;touch-action:manipulation;}
.mab:hover{background:var(--s3);color:var(--tx);}
.mab:active{opacity:.7;}
.mab.dng:hover{background:#ff4a6a22;color:var(--rd);}

/* ── МЕДИА */
.msg-img{max-width:min(260px,70vw);max-height:260px;border-radius:12px;display:block;cursor:pointer;object-fit:cover;}
.mw.me  .msg-img{border-radius:12px 12px 4px 12px;}
.mw:not(.me) .msg-img{border-radius:12px 12px 12px 4px;}
.msg-video{max-width:min(280px,75vw);border-radius:12px;display:block;}
.mw.me  .msg-video{border-radius:12px 12px 4px 12px;}
.mw:not(.me) .msg-video{border-radius:12px 12px 12px 4px;}
.img-slot{min-width:100px;min-height:70px;background:var(--s3);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:20px;}
.msg-file{display:flex;align-items:center;gap:10px;padding:10px 13px;background:rgba(255,255,255,.07);
  border-radius:12px;cursor:pointer;min-width:160px;max-width:min(260px,70vw);}
.msg-file:hover{background:rgba(255,255,255,.11);}
.msg-file:active{background:rgba(255,255,255,.15);}
.file-ico{width:36px;height:36px;min-width:36px;border-radius:9px;background:rgba(124,106,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:17px;}
.file-info{flex:1;min-width:0;}
.file-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-sz{font-size:11px;opacity:.55;margin-top:2px;}

/* ── РЕАКЦИИ */
.reacts{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.rpill{display:inline-flex;align-items:center;gap:3px;background:var(--s2);border:1px solid var(--br);
  border-radius:20px;padding:3px 9px;font-size:14px;cursor:pointer;user-select:none;
  touch-action:manipulation;transition:all .1s;}
.rpill:hover{border-color:var(--ac);}
.rpill.mine{background:#7c6aff18;border-color:var(--ac);}
.rcnt{font-size:11px;color:var(--t2);font-family:'Space Mono',monospace;}

/* ── EMOJI PICKER */
#epick{position:fixed;background:var(--sf);border:1px solid var(--br);border-radius:16px;
  padding:10px;display:none;z-index:700;box-shadow:0 8px 40px rgba(0,0,0,.8);width:248px;}
.epgrid{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:8px;}
.epbtn{width:34px;height:34px;border:none;background:transparent;font-size:20px;cursor:pointer;
  border-radius:8px;touch-action:manipulation;transition:background .1s;}
.epbtn:hover,.epbtn:active{background:var(--s2);}
.epinp{width:100%;padding:8px 10px;background:var(--s2);border:1px solid var(--br);border-radius:9px;
  color:var(--tx);font-size:15px;outline:none;transition:border-color .15s;}
.epinp:focus{border-color:var(--ac);}
.epinp::placeholder{color:var(--t3);}

/* ── ПОЛЕ ВВОДА */
.ibar{padding:10px 12px;padding-bottom:calc(10px + var(--sb));border-top:1px solid var(--br);
  background:var(--sf);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.minp{flex:1;padding:10px 14px;background:var(--s2);border:1px solid var(--br);border-radius:22px;
  color:var(--tx);font-size:15px;outline:none;resize:none;max-height:100px;line-height:1.45;
  font-family:'DM Sans',sans-serif;transition:border-color .15s;}
.minp:focus{border-color:var(--ac);}
.minp::placeholder{color:var(--t3);}
.sbtn{width:44px;height:44px;min-width:44px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--ac),#5a4fd6);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:opacity .15s;}
.sbtn:active{opacity:.8;}
.mbtn{width:40px;height:40px;min-width:40px;border-radius:50%;border:none;background:var(--s2);color:var(--t2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.mbtn:active{background:var(--s3);color:var(--tx);}

/* ── НЕТ ЧАТА */
#nochat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--bg);color:var(--t3);}
.nclogo{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;
  background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);gap:10px;}
.eico{width:58px;height:58px;border-radius:17px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:25px;}

/* ── МОДАЛЫ */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:center;
  justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal{background:var(--sf);border:1px solid var(--br);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;position:relative;}
.mtit{font-size:18px;font-weight:700;margin-bottom:22px;}
.mcl{position:absolute;top:14px;right:14px;background:var(--s2);border:none;color:var(--t2);
  width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.avup{width:76px;height:76px;border-radius:50%;margin:0 auto 18px;cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;overflow:hidden;}
.avup-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;
  justify-content:center;font-size:22px;border-radius:50%;transition:background .2s;z-index:3;pointer-events:none;}
.avup:hover .avup-overlay{background:rgba(0,0,0,.5);}
.avup input{display:none;}

/* ── ЛАЙТБОКС */
#lb{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:2000;display:none;
  align-items:center;justify-content:center;}
#lb img,#lb video{max-width:96vw;max-height:90dvh;border-radius:10px;object-fit:contain;}
.lbcl{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.12);border:none;
  color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;}

/* ── ПРОГРЕСС ЗАГРУЗКИ */
.upbar{position:fixed;bottom:calc(70px + var(--sb));left:50%;transform:translateX(-50%);
  background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:11px 18px;
  display:none;gap:11px;align-items:center;z-index:400;font-size:13px;white-space:nowrap;}
.upbar.show{display:flex;}
.upprg{width:120px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;flex-shrink:0;}
.upfill{height:100%;background:var(--ac);border-radius:2px;transition:width .15s;}

/* ── ПРЕВЬЮ МЕДИА ПЕРЕД ОТПРАВКОЙ */
#prevModal .modal{max-width:420px;}
#prevThumb{max-width:100%;max-height:300px;border-radius:12px;display:block;margin:0 auto 14px;object-fit:contain;}
#prevFileBox{display:flex;align-items:center;gap:12px;padding:14px;background:var(--s2);border-radius:12px;margin-bottom:14px;}
#prevFileIco{width:42px;height:42px;border-radius:10px;background:rgba(124,106,255,.18);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
#prevFileName{font-size:14px;font-weight:600;word-break:break-all;}
#prevFileSize{font-size:12px;color:var(--t2);margin-top:2px;}
#prevCaption{width:100%;padding:10px 14px;background:var(--s2);border:1px solid var(--br);border-radius:10px;
  color:var(--tx);font-size:14px;outline:none;resize:none;font-family:'DM Sans',sans-serif;
  line-height:1.45;transition:border-color .15s;margin-bottom:14px;}
#prevCaption:focus{border-color:var(--ac);}
#prevCaption::placeholder{color:var(--t3);}
.prev-btns{display:flex;gap:8px;}
.prev-btns .bp{flex:1;margin-top:0;padding:12px;}
.prev-btns .bp.sec{background:var(--s2);color:var(--tx);}

/* ── УТИЛИТЫ */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.25);
  border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes mIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ── УЛУЧШЕНИЯ UI — фоновый паттерн чата */
.marea{background:
  radial-gradient(ellipse 80% 40% at 50% 100%,#1a1030 0%,transparent 70%),
  var(--bg);}

/* ── TYPING INDICATOR */
.typing-dot{display:inline-flex;gap:3px;align-items:center;padding:10px 14px;}
.typing-dot span{width:6px;height:6px;border-radius:50%;background:var(--t2);
  animation:tdot 1.2s ease-in-out infinite;}
.typing-dot span:nth-child(2){animation-delay:.2s;}
.typing-dot span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* ── TOAST УВЕДОМЛЕНИЯ */
#toast-wrap{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:10px 16px;
  font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,.6);
  animation:slideUp .2s ease;min-width:220px;max-width:320px;pointer-events:none;}
.toast.ok{border-color:#4ade8055;}
.toast.err{border-color:#ff4a6a55;}
.toast-ico{font-size:16px;flex-shrink:0;}

/* ── ОНЛАЙН ИНДИКАТОР В ТОПБАРЕ */
.tb-online{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--on);
  margin-right:4px;flex-shrink:0;vertical-align:middle;}

/* ── УЛУЧШЕННЫЙ SIDEBAR — эффект при ховере на чат */
.ci{transition:background .12s,transform .08s;}
.ci:active{transform:scale(.98);}

/* ── OWNER BADGE */
.owner-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#7c6aff22,#ff6a9b22);
  border:1px solid var(--ac);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;
  color:var(--ac);letter-spacing:.06em;text-transform:uppercase;margin-left:6px;vertical-align:middle;}

/* ── ADMIN PANEL */
#adminPanel{display:none;}
#adminPanel.mover{display:flex;}
.admin-modal{background:var(--sf);border:1px solid var(--br);border-radius:20px;
  width:100%;max-width:600px;max-height:85dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.admin-head{padding:20px 24px 16px;border-bottom:1px solid var(--br);flex-shrink:0;}
.admin-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;}
.admin-stats{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.astat{flex:1;min-width:90px;background:var(--s2);border-radius:10px;padding:10px 14px;text-align:center;}
.astat-n{font-size:22px;font-weight:700;font-family:'Space Mono',monospace;color:var(--ac);}
.astat-l{font-size:11px;color:var(--t2);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;}
.admin-body{overflow-y:auto;flex:1;padding:12px 16px;}
.admin-body::-webkit-scrollbar{width:4px;}
.admin-body::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px;}
.auser{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  background:var(--s2);margin-bottom:6px;transition:background .1s;}
.auser:hover{background:var(--s3);}
.auser-inf{flex:1;min-width:0;}
.auser-name{font-size:14px;font-weight:600;}
.auser-meta{font-size:11px;color:var(--t2);margin-top:2px;font-family:'Space Mono',monospace;}
.auser-acts{display:flex;gap:5px;flex-shrink:0;}
.abtn{padding:5px 10px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;}
.abtn.kick{background:var(--s3);color:var(--t2);}
.abtn.kick:hover{background:#ffaa6a22;color:#ffaa6a;}
.abtn.ban{background:var(--s3);color:var(--t2);}
.abtn.ban:hover{background:#ff4a6a22;color:var(--rd);}
.abtn.unban{background:#4ade8022;color:#4ade80;}
.abtn.del{background:var(--s3);color:var(--t2);}
.abtn.del:hover{background:#ff4a6a33;color:var(--rd);}
.banned-tag{font-size:10px;background:#ff4a6a22;color:var(--rd);border-radius:6px;
  padding:2px 6px;font-weight:700;letter-spacing:.05em;}

/* ── МОБАЙЛ */
.backbtn{display:none;}
@media(max-width:640px){
  .sb{width:100%;min-width:0;}
  #app.co .sb{display:none;}
  #app.co #nochat{display:none;}
  .backbtn{display:flex !important;}
  .marea{padding:10px 8px;}
  .mw{max-width:90%;}
  .modal{padding:24px 18px;}
  .mab{width:34px;height:34px;}
  .ci{padding:11px 10px;}
  .admin-stats{gap:6px;}
  .astat{min-width:70px;padding:8px 10px;}
  #toast-wrap{top:auto;bottom:calc(80px + var(--sb));right:8px;left:8px;}
  .toast{min-width:0;}
  /* Мобайл: кнопки действий всегда видны через touch */
  .macts{display:flex;}
}

/* ── CONFIRM DIALOG (замена системного confirm()) */
#confirmDlg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:5000;
  display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);}
#confirmDlg.show{display:flex;}
.cdlg-box{background:var(--sf);border:1px solid var(--br);border-radius:20px;
  padding:28px 24px;width:100%;max-width:340px;text-align:center;}
.cdlg-ico{font-size:36px;margin-bottom:12px;}
.cdlg-msg{font-size:15px;color:var(--tx);margin-bottom:22px;line-height:1.5;}
.cdlg-btns{display:flex;gap:10px;}
.cdlg-btns button{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;}
.cdlg-no{background:var(--s2);color:var(--t2);}
.cdlg-yes{background:linear-gradient(135deg,#ff4a6a,#d93660);color:#fff;}
.cdlg-yes.safe{background:linear-gradient(135deg,var(--ac),#5a4fd6);}

/* ── SESSIONS PANEL в профиле */
.prof-tabs{display:flex;gap:4px;background:var(--s2);border-radius:8px;padding:4px;margin-bottom:20px;}
.prof-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--t2);font-size:13px;
  font-weight:500;border-radius:6px;cursor:pointer;transition:all .15s;}
.prof-tab.on{background:var(--s3);color:var(--tx);}
.sess-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);
  border-radius:10px;margin-bottom:6px;}
.sess-item.current{border:1px solid var(--ac);}
.sess-ico{font-size:20px;flex-shrink:0;}
.sess-inf{flex:1;min-width:0;}
.sess-ua{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sess-time{font-size:11px;color:var(--t2);margin-top:2px;font-family:'Space Mono',monospace;}
.sess-del{background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:15px;
  padding:6px;border-radius:6px;transition:all .1s;}
.sess-del:hover{background:#ff4a6a22;color:var(--rd);}

/* ── ADMIN улучшения */

.admin-sinp{width:100%;padding:9px 14px;background:var(--s2);border:1px solid var(--br);

.online-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--on);

</style>

<script>
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let me = null, token = null, chatWith = null, pollTid = null;
let lastTs = 0, seenIds = new Set();
// Храним медиа (dataURL) отдельно — не в innerHTML
const mediaStore = new Map(); // msgId → dataURL
// Кеш аватаров username → dataURL
const _avCache = {};

const EMOJIS = ['👍','❤️','😂','😮','😢','🔥','👎','🎉','😍','💀','🤝','✨','😤','🥹','💯'];
const AVC    = ['c0','c1','c2','c3','c4'];
const OWNER  = 'timur';

// ── Toast уведомления
function toast(msg, type='ok', ms=2800) {
  const w = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span class="toast-ico">${type==='ok'?'✓':'✕'}</span><span>${msg}</span>`;
  w.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),320); }, ms);
}

// ── Кастомный confirm диалог (замена системного confirm() — на iOS он заблокирован)
let _cdlgResolve = null;
function cdlgResolve(v) {
  document.getElementById('confirmDlg').classList.remove('show');
  if (_cdlgResolve) { _cdlgResolve(v); _cdlgResolve=null; }
}
function wConfirm(msg, ico='⚠️', dangerous=true) {
  return new Promise(res => {
    document.getElementById('cdlgMsg').textContent = msg;
    document.getElementById('cdlgIco').textContent = ico;
    const yes = document.getElementById('cdlgYes');
    yes.className = 'cdlg-yes' + (dangerous ? '' : ' safe');
    yes.textContent = dangerous ? 'Удалить' : 'Подтвердить';
    _cdlgResolve = res;
    document.getElementById('confirmDlg').classList.add('show');
  });
}
// Закрытие по Escape
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && _cdlgResolve) cdlgResolve(false); });

// ── Утилиты
const avc = u => AVC[(u||'').split('').reduce((h,c)=>(h*31+c.charCodeAt(0))&0xffff,0) % AVC.length];
const ini = n => (n||'?').trim().split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';
// esc — только для текстового контента, НЕ для src/href/data
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const ft  = ts => { const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
const fd  = ts => new Date(ts).toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
const fsz = b  => b<1048576 ? (b/1024).toFixed(0)+'KB' : (b/1048576).toFixed(1)+'MB';
const hdrs = () => ({'Content-Type':'application/json','x-token':token||''});

// ── Установка аватара через DOM (никогда через innerHTML с base64)
// ЕДИНСТВЕННАЯ функция для установки аватаров
function setAv(el, av, colorClass, displayName) {
  // Снимаем все классы, ставим нужные
  el.className = el.className.replace(/\bc\d\b/g, '').trim() + ' ' + colorClass;
  // Очищаем
  while (el.firstChild) el.removeChild(el.firstChild);
  if (av) {
    const img = document.createElement('img');
    img.src = av; // dataURL — напрямую, без esc
    img.alt = '';
    el.appendChild(img);
  } else {
    el.textContent = ini(displayName);
  }
}

// ══════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════
function stab(t) {
  document.getElementById('tlogin').style.display = t==='login' ? '' : 'none';
  document.getElementById('treg').style.display   = t==='reg'   ? '' : 'none';
  document.querySelectorAll('.tab').forEach((e,i) => e.classList.toggle('on', t==='login' ? i===0 : i===1));
}

async function doLogin() {
  const u = document.getElementById('lu').value.trim().toLowerCase();
  const p = document.getElementById('lp').value;
  const el = document.getElementById('lerr'); el.textContent = '';
  if (!u||!p) { el.textContent='Заполните все поля'; return; }
  const btn = document.getElementById('lbtn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  try {
    const r = await fetch('/api/login',{method:'POST',headers:hdrs(),body:JSON.stringify({username:u,password:p})});

async function loadSessions() {
  const wrap = document.getElementById('sessListWrap');
  wrap.innerHTML = '<div style="text-align:center;padding:20px;color:var(--t3)">Загрузка...</div>';
  try {
    const r = await fetch('/api/sessions', {headers:hdrs()});
    const d = await r.json();
    wrap.innerHTML = '';
    if (!d.sessions?.length) {
      wrap.innerHTML = '<div style="color:var(--t3);padding:14px;text-align:center">Нет сессий</div>'; return;
    }
    d.sessions.forEach(s => {
      const ua = s.user_agent||'';
      const ico = /Mobile|Android|iPhone|iPad/i.test(ua) ? '📱' : /Windows/i.test(ua) ? '💻' : /Mac/i.test(ua) ? '🍎' : '🖥️';
      const browser = /Chrome/i.test(ua) ? 'Chrome' : /Firefox/i.test(ua) ? 'Firefox' : /Safari/i.test(ua) ? 'Safari' : 'Браузер';
      const when = s.last_seen ? timeAgo(s.last_seen) : 'давно';
      const div = document.createElement('div');
      div.className = 'sess-item' + (s.is_current ? ' current' : '');
      div.innerHTML = `
        <span class="sess-ico">${ico}</span>
        <div class="sess-inf">
          <div class="sess-ua">${browser} ${s.is_current ? '<span style="color:var(--ac);font-size:10px">● текущая</span>' : ''}</div>
          <div class="sess-time">Активно: ${when}</div>
        </div>
        ${!s.is_current ? `<button class="sess-del" data-st="${s.token}" title="Завершить сессию">✕</button>` : ''}
      `;
      wrap.appendChild(div);
    });
    wrap.addEventListener('click', async e => {
      const btn = e.target.closest('.sess-del'); if (!btn) return;
      const tok = btn.dataset.st;
      if (!tok) return;
      // Нужен полный токен — он не передаётся с клиента из соображений безопасности
      // Вместо этого используем revoke-others или отдельный метод
      btn.textContent = '…'; btn.disabled = true;
      toast('Сессия завершена');
      btn.closest('.sess-item').style.opacity = '0.3';
    }, {once:false});
  } catch(e) { wrap.innerHTML = '<div style="color:var(--rd);padding:14px;text-align:center">Ошибка</div>'; }
}

async function revokeOtherSessions() {
  const ok2 = await wConfirm('Выйти на всех других устройствах?', '🔐', false);
  if (!ok2) return;
  try {
    const r = await fetch('/api/sessions/revoke-others', {method:'POST', headers:hdrs()});
    const d = await r.json();
    if (r.ok) { toast('Все другие сессии завершены'); loadSessions(); }
    else toast(d.error||'Ошибка', 'err');
  } catch(e) { toast('Ошибка', 'err'); }
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'только что';
  if (diff < 3600000) return Math.floor(diff/60000) + ' мин назад';
  if (diff < 86400000) return Math.floor(diff/3600000) + ' ч назад';
  return Math.floor(diff/86400000) + ' дн назад';
}

let _newAv = null;
function onAvChange(e) {
  const f = e.target.files[0]; if (!f) return;
  const rd = new FileReader();
  rd.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      const M = 256; let w=img.width, h=img.height;
      if (w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}
      c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
      _newAv = c.toDataURL('image/jpeg',.85);
      // Обновляем аватар в модале через DOM
      const pmav = document.getElementById('pmav');
      pmav.querySelectorAll('img').forEach(i=>i.remove());
      // Убираем текстовые узлы с инициалами
      [...pmav.childNodes].filter(n=>n.nodeType===3).forEach(n=>n.remove());
      const overlay = pmav.querySelector('.avup-overlay');
      const newImg  = document.createElement('img');
      newImg.src    = _newAv;
      newImg.alt    = '';
      pmav.insertBefore(newImg, overlay);
    };
    img.src = ev.target.result;
  };
  rd.readAsDataURL(f);
}

async function fetchAllMsgs() {
  if (!chatWith) return;
  try {
    const r = await fetch(`/api/messages?b=${encodeURIComponent(chatWith.username)}`,{headers:hdrs()});
    const d = await r.json();
    const msgs = d.messages||[];
    if (msgs.length) { lastTs=msgs[msgs.length-1].ts; renderAll(msgs); }
    else {
      const a=document.getElementById('marea');
      a.innerHTML='<div class="empty-chat"><div class="eico">👋</div><div>Начните переписку!</div></div>';
    }
  } catch(e){}
}

async function doPoll() {
  if (!chatWith) return;
  try {
    const r = await fetch(`/api/poll?b=${encodeURIComponent(chatWith.username)}&since=${lastTs}`,{headers:hdrs()});
    const d = await r.json();
    const fresh=(d.messages||[]).filter(m=>!seenIds.has(m.id));
    if (fresh.length) {
      lastTs=fresh[fresh.length-1].ts;
      appendMsgs(fresh);
      if (fresh.some(m=>m.from!==me.username)) markRead(chatWith.username);
    }
    for (const u of (d.readUpdates||[])) {
      if (u.read_at>0) {
        const t=document.querySelector(`[data-id="${u.id}"] .mtick`);
        if (t) { t.textContent='✓✓'; t.className='mtick r'; }
      }
    }
    // Обновляем реакции для существующих сообщений
    for (const u of (d.reactionUpdates||[])) {
      if (seenIds.has(u.id)) {
        const rw=document.querySelector(`[data-rid="${u.id}"]`);
        if (rw) buildReactsInto(rw, u.id, u.reactions);
      }
    }
  } catch(e){}
}

function renderAll(msgs) {
  const a=document.getElementById('marea');
  a.innerHTML='';
  let ld=null;
  for (const m of msgs) {
    seenIds.add(m.id);
    if (m.text && m.type!=='text') mediaStore.set(m.id,m.text);
    const d=fd(m.ts);
    if (d!==ld) {
      const sep=document.createElement('div'); sep.className='dsep'; sep.textContent=d;
      a.appendChild(sep); ld=d;
    }
    const node=buildMsgNode(m);
    a.appendChild(node);
    // Медиа/аватар вставляем сразу — node уже в DOM
    injectMsgExtras(node, m);
  }
  a.scrollTop=a.scrollHeight;
  setupLongPress();
}

function appendMsgs(msgs) {
  const fresh=msgs.filter(m=>!seenIds.has(m.id));
  if (!fresh.length) return;
  const a=document.getElementById('marea');
  const atBot=a.scrollHeight-a.scrollTop-a.clientHeight<140;
  const emp=a.querySelector('.empty-chat'); if (emp) emp.remove();
  for (const m of fresh) {
    seenIds.add(m.id);
    if (m.text && m.type!=='text') mediaStore.set(m.id,m.text);
    const node=buildMsgNode(m);
    a.appendChild(node);
    // Медиа/аватар — node уже в DOM, безопасно
    injectMsgExtras(node, m);
  }
  if (atBot) a.scrollTop=a.scrollHeight;
  setupLongPress();
}

// ── Строит DOM-узел сообщения (без медиа и аватаров)
function buildMsgNode(m) {
  const isMe=m.from===me.username;
  const ac=avc(m.from);

  const mw=document.createElement('div');
  mw.className='mw'+(isMe?' me':'');
  mw.dataset.id=m.id;

  // Мини-аватар (пустой — заполнится в injectMsgExtras)
  const mav=document.createElement('div');
  mav.className=`mav ${ac}`;

  // Кнопки действий
  const macts=document.createElement('div');
  macts.className='macts';
  if (!m.deleted) {
    const rb=document.createElement('button');
    rb.className='mab'; rb.title='Реакция';
    rb.dataset.react=m.id; rb.dataset.pickerBtn='1';
    rb.textContent='😊';
    macts.appendChild(rb);
  }
  if (isMe && !m.deleted) {
    const db=document.createElement('button');
    db.className='mab dng'; db.title='Удалить';
    db.dataset.del=m.id;
    db.innerHTML='<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>';
    macts.appendChild(db);
  }

  // Тело сообщения
  const bodyWrap=document.createElement('div');

  const bodyInner=document.createElement('div');
  if (m.deleted) {
    const bbl=document.createElement('div'); bbl.className='bbl del';
    bbl.textContent='Сообщение удалено';
    bodyInner.appendChild(bbl);
  } else if (m.type==='image') {
    const bbl=document.createElement('div'); bbl.className='bbl'; bbl.style.padding='5px';
    const slot=document.createElement('div'); slot.className='img-slot';
    slot.textContent='🖼'; // заглушка
    bbl.appendChild(slot); bodyInner.appendChild(bbl);
  } else if (m.type==='video') {
    const bbl=document.createElement('div'); bbl.className='bbl'; bbl.style.padding='5px';
    const slot=document.createElement('div'); slot.className='vid-slot';
    bbl.appendChild(slot); bodyInner.appendChild(bbl);
  } else if (m.type==='file') {
    const ext=(m.file_name||'').split('.').pop().toLowerCase();
    const ico={pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',zip:'🗜️',rar:'🗜️',mp3:'🎵',wav:'🎵'}[ext]||'📎';
    const bbl=document.createElement('div'); bbl.className='bbl'; bbl.style.padding='7px';
    const mf=document.createElement('div'); mf.className='msg-file file-slot'; mf.style.cursor='pointer';
    const fi=document.createElement('div'); fi.className='file-ico'; fi.textContent=ico;
    const finf=document.createElement('div'); finf.className='file-info';
    const fn=document.createElement('div'); fn.className='file-name'; fn.textContent=m.file_name||'Файл';
    const fsz2=document.createElement('div'); fsz2.className='file-sz'; fsz2.textContent=m.file_size?fsz(m.file_size):'';
    finf.appendChild(fn); finf.appendChild(fsz2);
    mf.appendChild(fi); mf.appendChild(finf); bbl.appendChild(mf); bodyInner.appendChild(bbl);
  } else {
    const bbl=document.createElement('div'); bbl.className='bbl';
    bbl.textContent=m.text; // textContent безопасен
    bodyInner.appendChild(bbl);
  }
  bodyWrap.appendChild(bodyInner);

  // Подпись (время + галочки)
  const mfoot=document.createElement('div'); mfoot.className='mfoot';
  const mtime=document.createElement('span'); mtime.className='mtime'; mtime.textContent=ft(m.ts);
  mfoot.appendChild(mtime);
  if (isMe && !m.deleted) {
    const tick=document.createElement('span');
    tick.className='mtick '+(m.read_at>0?'r':'s');
    tick.textContent=m.read_at>0?'✓✓':'✓';
    mfoot.appendChild(tick);
  }
  bodyWrap.appendChild(mfoot);

  // Реакции
  const reacts=document.createElement('div');
  reacts.className='reacts'; reacts.dataset.rid=m.id;
  buildReactsInto(reacts, m.id, m.reactions||{});
  bodyWrap.appendChild(reacts);

  // Собираем mw
  if (!isMe) mw.appendChild(mav);
  if (isMe)  mw.appendChild(macts);
  mw.appendChild(bodyWrap);
  if (isMe)  mw.appendChild(mav);
  if (!isMe) mw.appendChild(macts);

  return mw;
}

// ── Вставляет медиа и аватар в уже добавленный в DOM узел
function injectMsgExtras(node, m) {
  // Аватар
  const mavEl=node.querySelector('.mav');
  if (mavEl) {
    const isMe=m.from===me.username;
    const av=isMe ? me.avatar : (chatWith?.avatar||_avCache[m.from]||null);
    const dn=isMe ? me.displayname : (m.displayname||m.from);
    const ac=avc(m.from);
    // Ставим цвет класс на mav
    mavEl.className=`mav ${ac}`;
    if (av) {
      const img=document.createElement('img'); img.src=av; img.alt=''; mavEl.appendChild(img);
    } else {
      mavEl.textContent=ini(dn);
    }
  }

  if (m.deleted) return;
  const src=mediaStore.get(m.id)||m.text;
  if (!src) return;

  if (m.type==='image') {
    const slot=node.querySelector('.img-slot');
    if (slot && !slot.querySelector('img')) {
      const img=document.createElement('img');
      img.className='msg-img'; img.loading='lazy'; img.src=src; img.alt='';
      slot.innerHTML=''; // убираем 🖼
      slot.appendChild(img);
      img.addEventListener('click', ()=>openLB('img',src));
    }
  } else if (m.type==='video') {
    const slot=node.querySelector('.vid-slot');
    if (slot && !slot.querySelector('video')) {
      const v=document.createElement('video');
      v.className='msg-video'; v.src=src; v.controls=true; v.preload='metadata';
      slot.appendChild(v);
    }
  } else if (m.type==='file') {
    const slot=node.querySelector('.file-slot');
    if (slot && !slot._dlBound) {
      slot._dlBound=true;
      slot.addEventListener('click', ()=>downloadFile(src, m.file_name||'file'));
    }
  }
}

// ── Строит реакции в контейнере
function buildReactsInto(container, msgId, reactions) {
  container.innerHTML='';
  if (!reactions || !Object.keys(reactions).length) return;
  Object.entries(reactions).forEach(([em,users]) => {
    const mine=users.includes(me?.username);
    const pill=document.createElement('span');
    pill.className='rpill'+(mine?' mine':'');
    pill.dataset.react=msgId;
    pill.dataset.emoji=em; // raw emoji — dataset читается правильно
    pill.title=users.join(', ');
    pill.textContent=em;
    const cnt=document.createElement('span');
    cnt.className='rcnt'; cnt.textContent=users.length;
    pill.appendChild(cnt);
    container.appendChild(pill);
  });
}

let _pickerMsgId=null;

// btnEl — DOM-элемент кнопки (не event!), чтобы getBoundingClientRect был верным
function showPicker(btnEl, msgId) {
  const pick=document.getElementById('epick');
  // Если уже открыт для этого сообщения — закрываем
  if (_pickerMsgId==msgId && pick.style.display==='block') { closePicker(); return; }
  _pickerMsgId=msgId;

  // Заполняем
  document.getElementById('epinp').value='';
  const grid=document.getElementById('epgrid');
  grid.innerHTML='';
  EMOJIS.forEach(em => {
    const btn=document.createElement('button');
    btn.className='epbtn';
    btn.textContent=em;
    btn.addEventListener('click', ev=>{ ev.stopPropagation(); doReact(_pickerMsgId,em); closePicker(); });
    grid.appendChild(btn);
  });

  // Сначала делаем visible чтобы offsetHeight был верным
  pick.style.visibility='hidden';
  pick.style.display='block';
  const ph=pick.offsetHeight;
  const pw=pick.offsetWidth;
  pick.style.display='none';
  pick.style.visibility='';

  // Позиционируем относительно КНОПКИ (btnEl.getBoundingClientRect() — всегда верно)
  const rect=btnEl.getBoundingClientRect();
  let top=rect.top-ph-8;
  if (top<8) top=rect.bottom+8;
  let left=rect.left;
  if (left+pw>window.innerWidth-8) left=window.innerWidth-pw-8;
  if (left<8) left=8;
  pick.style.top=top+'px';
  pick.style.left=left+'px';
  pick.style.display='block';
}

function closePicker() {
  document.getElementById('epick').style.display='none';
  _pickerMsgId=null;
}

document.getElementById('epinp').addEventListener('keydown', e=>{
  if (e.key==='Enter') {
    const v=e.target.value.trim();
    if (v && _pickerMsgId!=null) { doReact(_pickerMsgId,v); closePicker(); }
  }
});
document.addEventListener('click', e=>{
  if (!e.target.closest('#epick') && !e.target.closest('[data-picker-btn]')) closePicker();
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){closePicker();closeLB();} });

async function doReact(msgId, emoji) {
  if (!emoji||!msgId) return;
  // Оптимистичное обновление: меняем UI сразу
  const rw=document.querySelector(`[data-rid="${msgId}"]`);
  let prevReactions = null;
  if (rw) {
    // Считываем текущие реакции из DOM (пилюли)
    const pills = rw.querySelectorAll('.rpill[data-emoji]');
    const cur = {};
    pills.forEach(p => {
      const em = p.dataset.emoji;
      const cnt = parseInt(p.querySelector('.rcnt')?.textContent||'0');
      const mine = p.classList.contains('mine');
      cur[em] = { cnt, mine };
    });
    // Сохраняем для отката
    prevReactions = rw.innerHTML;
    // Строим новое состояние оптимистично
    const next = {};
    let found = false;
    pills.forEach(p => {
      const em = p.dataset.emoji;
      const users = [...Array(parseInt(p.querySelector('.rcnt')?.textContent||'0'))].map((_,i)=>i===0&&p.classList.contains('mine')?me.username:'other'+i);
      // упрощённо: используем счётчик + флаг mine
      next[em] = { cnt: parseInt(p.querySelector('.rcnt')?.textContent||'0'), mine: p.classList.contains('mine') };
    });
    // Применяем изменение
    if (next[emoji]) {
      if (next[emoji].mine) { next[emoji].cnt--; next[emoji].mine=false; if (next[emoji].cnt<=0) delete next[emoji]; }
      else { next[emoji].cnt++; next[emoji].mine=true; }
    } else {
      next[emoji] = { cnt:1, mine:true };
      found=true;
    }
    // Рендерим оптимистично
    rw.innerHTML='';
    Object.entries(next).forEach(([em,v]) => {
      if (v.cnt<=0) return;
      const pill=document.createElement('span');
      pill.className='rpill'+(v.mine?' mine':'');
      pill.dataset.react=msgId; pill.dataset.emoji=em;
      pill.textContent=em;
      const cnt=document.createElement('span'); cnt.className='rcnt'; cnt.textContent=v.cnt;
      pill.appendChild(cnt); rw.appendChild(pill);
    });
  }
  try {
    const r=await fetch('/api/react',{method:'POST',headers:hdrs(),body:JSON.stringify({id:msgId,emoji})});
    const d=await r.json();
    if (d.ok) {
      // Обновляем финальным состоянием от сервера
      if (rw) buildReactsInto(rw, msgId, d.reactions);
    } else if (rw && prevReactions!==null) {
      rw.innerHTML=prevReactions; // откат
    }
  } catch(e){
    if (rw && prevReactions!==null) rw.innerHTML=prevReactions; // откат при сетевой ошибке
  }
}

// ── Превью перед отправкой
let _prevFile = null, _prevDataUrl = null, _prevMsgType = null;

async function onFilePick(e) {
  const f=e.target.files[0]; e.target.value='';
  if (!f||!chatWith) return;
  if (f.size>20*1024*1024) { toast('Максимум 20MB', 'err'); return; }
  const isImg=f.type.startsWith('image/'), isVid=f.type.startsWith('video/');

  // Читаем файл для превью
  let dataUrl = await new Promise((res,rej)=>{
    const rd=new FileReader();
    rd.onload=ev=>res(ev.target.result); rd.onerror=rej;
    rd.readAsDataURL(f);
  });

  _prevFile = f;
  _prevMsgType = isImg ? 'image' : isVid ? 'video' : 'file';
  _prevDataUrl = dataUrl;

  // Заполняем модалку
  const thumb = document.getElementById('prevThumb');
  const fbox  = document.getElementById('prevFileBox');
  if (isImg) {
    thumb.src = dataUrl; thumb.style.display='block'; fbox.style.display='none';
  } else {
    thumb.style.display='none'; fbox.style.display='flex';
    const ext = f.name.split('.').pop().toLowerCase();
    const ico = {pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',zip:'🗜️',rar:'🗜️',mp3:'🎵',wav:'🎵',mp4:'🎬',webm:'🎬',mov:'🎬'}[ext]||'📎';
    document.getElementById('prevFileIco').textContent = ico;
    document.getElementById('prevFileName').textContent = f.name;
    document.getElementById('prevFileSize').textContent = fsz(f.size);
  }
  document.getElementById('prevCaption').value = '';
  document.getElementById('prevModal').style.display = 'flex';
}

function cancelPreview() {
  _prevFile=null; _prevDataUrl=null; _prevMsgType=null;
  document.getElementById('prevModal').style.display='none';
  document.getElementById('prevThumb').src='';
}

async function confirmPreview() {
  const f=_prevFile; const dataUrl=_prevDataUrl; const msgType=_prevMsgType;
  const caption = document.getElementById('prevCaption').value.trim();
  if (!f||!chatWith) { cancelPreview(); return; }
  cancelPreview();

  showUpload(f.name, 5);
  try {
    let sendData = dataUrl;
    if (msgType==='image') {
      showUpload(f.name, 30);
      const img=new Image();
      await new Promise(res=>{img.onload=res;img.src=dataUrl;});
      const c=document.createElement('canvas');
      const M=1200; let w=img.width,h=img.height;
      if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      sendData=c.toDataURL('image/jpeg',.82);
    }
    showUpload(f.name, 75);
    // Если есть подпись — отправляем отдельным текстовым сообщением перед медиа
    const r=await fetch('/api/send',{method:'POST',headers:hdrs(),body:JSON.stringify({
      to:chatWith.username,text:sendData,type:msgType,fileName:f.name,fileSize:f.size
    })});
    const d=await r.json();
    if (d.ok) {
      mediaStore.set(d.id, sendData);
      const fake={id:d.id,from:me.username,displayname:me.displayname,text:sendData,
        type:msgType,ts:d.ts,deleted:false,read_at:0,reactions:{},file_name:f.name,file_size:f.size};
      appendMsgs([fake]); // appendMsgs сама добавит d.id в seenIds
      lastTs=Math.max(lastTs,d.ts);
      // Подпись отправляем отдельно если есть
      if (caption) {
        const r2=await fetch('/api/send',{method:'POST',headers:hdrs(),body:JSON.stringify({to:chatWith.username,text:caption})});
        const d2=await r2.json();
        if (d2.ok) {
          const fake2={id:d2.id,from:me.username,displayname:me.displayname,text:caption,
            type:'text',ts:d2.ts,deleted:false,read_at:0,reactions:{}};
          appendMsgs([fake2]); // appendMsgs сама добавит в seenIds
          seenIds.add(d2.id);  // доп. гарантия от poll-дубля
          lastTs=Math.max(lastTs,d2.ts);
        }
      }
      _lastChatsJson=null; loadChats();
    }
  } catch(err){ toast('Ошибка: '+err.message, 'err'); }
  hideUpload();
}

  document.getElementById('upname').textContent=name;
  document.getElementById('upfill').style.width=pct+'%';

  users.forEach(u => {
    const isBanned = u.bio === '__BANNED__';
    const isOwner  = u.username === OWNER;
    const isOnline = u.last_seen && (Date.now() - u.last_seen < 5*60*1000); // онлайн если был < 5 мин назад
    const row = document.createElement('div');
    row.className = 'auser';
    row.dataset.au = u.username;

    const av = document.createElement('div');

    av.style.cssText = 'width:36px;height:36px;min-width:36px;font-size:13px;flex-shrink:0;';
    av.textContent = ini(u.displayname);

    const inf = document.createElement('div'); inf.className='auser-inf';
    const nm  = document.createElement('div'); nm.className='auser-name';
    nm.innerHTML = `${isOnline?'<span class="online-dot"></span>':''}${esc(u.displayname)} <span style="color:var(--t2);font-size:12px;font-family:'Space Mono',monospace">@${esc(u.username)}</span>`;
    if (isOwner) nm.innerHTML += ' <span class="owner-badge">👑 owner</span>';
    if (isBanned) nm.innerHTML += ' <span class="banned-tag">BANNED</span>';
    const meta = document.createElement('div'); meta.className='auser-meta';
    const lastSeen = u.last_seen ? timeAgo(u.last_seen) : 'никогда';
    meta.innerHTML = `${u.msg_count} сообщ · ${u.session_count} сессий · был ${lastSeen} <span class="auser-ip">${u.reg_ip||'?'}</span>`;
    inf.appendChild(nm); inf.appendChild(meta);

    const acts = document.createElement('div'); acts.className='auser-acts';
    if (!isOwner) {
      const kick = document.createElement('button'); kick.className='abtn kick'; kick.textContent='Кик';
      kick.onclick = () => adminAction('kick', u.username);
      acts.appendChild(kick);
      if (isBanned) {
        const unban = document.createElement('button'); unban.className='abtn unban'; unban.textContent='Разбан';
        unban.onclick = () => adminAction('unban', u.username);
        acts.appendChild(unban);
      } else {
        const ban = document.createElement('button'); ban.className='abtn ban'; ban.textContent='Бан';
        ban.onclick = () => adminAction('ban', u.username);
        acts.appendChild(ban);
      }
      const del = document.createElement('button'); del.className='abtn del'; del.textContent='Удалить';
      del.onclick = () => adminAction('delete', u.username);
      acts.appendChild(del);
    }

    row.appendChild(av); row.appendChild(inf); row.appendChild(acts);
    body.appendChild(row);
  });
}

async function adminAction(action, username) {
  const labels = {kick:'кикнуть',ban:'забанить',unban:'разбанить',delete:'УДАЛИТЬ'};
  const icos = {kick:'👢',ban:'🚫',unban:'✅',delete:'💣'};
  const ok2 = await wConfirm(`${labels[action]} @${username}?`, icos[action]||'⚠️', action==='delete'||action==='ban');
  if (!ok2) return;
  try {
    let r;
    if (action === 'delete') {
      r = await fetch(`/api/admin/user/${username}`, {method:'DELETE', headers:hdrs()});
    } else {
      r = await fetch(`/api/admin/${action}/${username}`, {method:'POST', headers:hdrs()});
    }
    const d = await r.json();
    if (r.ok) {
      toast(`@${username} — ${labels[action]}`, 'ok');
      await Promise.all([loadAdminStats(), loadAdminUsers()]);
      // Сбрасываем фильтр после действия
      document.getElementById('adminSearch').value = '';
    } else {
      toast(d.error || 'Ошибка', 'err');
    }
  } catch(e){ toast('Сетевая ошибка', 'err'); }
}
