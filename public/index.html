<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Wavr</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0f;--surface:#111118;--s2:#1a1a24;--s3:#22222f;
  --border:#2a2a3a;--acc:#7c6aff;--acc2:#ff6a9b;--acc3:#6affce;
  --txt:#e8e8f0;--txt2:#8888aa;--txt3:#4a4a66;--on:#4ade80;--red:#ff4a6a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);height:100dvh;overflow:hidden;}

/* AUTH */
#auth{display:flex;align-items:center;justify-content:center;height:100dvh;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a1030,var(--bg) 70%);}
.abox{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;position:relative;overflow:hidden;}
.abox::before{content:'';position:absolute;top:-80px;left:-80px;width:220px;height:220px;background:radial-gradient(circle,#7c6aff22,transparent 70%);pointer-events:none;}
.logo{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;
  background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.asub{color:var(--txt2);font-size:14px;margin-bottom:32px;}
.tabs{display:flex;gap:4px;background:var(--s2);border-radius:8px;padding:4px;margin-bottom:24px;}
.tab{flex:1;padding:8px;border:none;background:transparent;color:var(--txt2);font-size:14px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .2s;}
.tab.on{background:var(--s3);color:var(--txt);}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--txt2);margin-bottom:7px;}
.fi{width:100%;padding:12px 16px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--txt);font-family:'Space Mono',monospace;font-size:14px;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--acc);}
.fi::placeholder{color:var(--txt3);}
.bp{width:100%;padding:13px;background:linear-gradient(135deg,var(--acc),#5a4fd6);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .2s,transform .1s;}
.bp:hover{opacity:.9;}.bp:active{transform:scale(.98);}.bp:disabled{opacity:.5;cursor:not-allowed;}
.err{color:var(--acc2);font-size:13px;margin-top:10px;text-align:center;min-height:18px;}

/* APP */
#app{display:none;height:100dvh;}
.layout{display:flex;height:100dvh;}

/* SIDEBAR */
.sb{width:300px;min-width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100dvh;}
.sbh{padding:18px 18px 14px;border-bottom:1px solid var(--border);}
.alogo{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;
  background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
.urow{display:flex;align-items:center;gap:10px;}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:13px;font-weight:700;flex-shrink:0;position:relative;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avlg{width:42px;height:42px;font-size:15px;}
.avon::after{content:'';position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:var(--on);border-radius:50%;border:2px solid var(--surface);}
.c0{background:#7c6aff22;color:var(--acc);}
.c1{background:#ff6a9b22;color:var(--acc2);}
.c2{background:#6affce22;color:var(--acc3);}
.c3{background:#ffaa6a22;color:#ffaa6a;}
.c4{background:#6ab8ff22;color:#6ab8ff;}
.ui{flex:1;min-width:0;}
.un{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ut{font-size:12px;color:var(--txt2);font-family:'Space Mono',monospace;}
.ib{width:30px;height:30px;border-radius:7px;border:none;background:var(--s2);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.ib:hover{background:var(--s3);color:var(--txt);}
.ib.dng:hover{background:#ff4a6a22;color:var(--red);}

.srw{padding:10px 14px;border-bottom:1px solid var(--border);}
.sbox{position:relative;}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none;}
.sinp{width:100%;padding:9px 14px 9px 34px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--txt);font-size:13px;outline:none;transition:border-color .2s;}
.sinp:focus{border-color:var(--acc);}
.sinp::placeholder{color:var(--txt3);}
#sres{display:none;padding:6px;border-bottom:1px solid var(--border);}
.sri{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:background .15s;}
.sri:hover{background:var(--s2);}

.clabel{padding:10px 16px 5px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);}
.clist{flex:1;overflow-y:auto;padding:4px 6px;}
.clist::-webkit-scrollbar{width:3px;}
.clist::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}
.ci{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .15s;position:relative;}
.ci:hover{background:var(--s2);}
.ci:hover .cdel{opacity:1;}
.ci.act{background:var(--s3);}
.ci.act::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--acc);border-radius:0 3px 3px 0;}
.cinfo{flex:1;min-width:0;}
.cname{font-size:14px;font-weight:600;}
.cprev{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.cmeta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.ctime{font-size:11px;color:var(--txt3);}
.badge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;min-width:18px;text-align:center;}
.cdel{opacity:0;transition:opacity .15s;background:transparent;border:none;color:var(--txt3);cursor:pointer;padding:4px;border-radius:4px;}
.cdel:hover{color:var(--red);}
.empty-list{padding:28px 14px;text-align:center;color:var(--txt3);font-size:13px;line-height:1.6;}

/* CHAT */
.cmain{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);}
.tbinfo{flex:1;cursor:pointer;}
.tbname{font-size:15px;font-weight:600;}
.tbst{font-size:12px;color:var(--txt2);margin-top:1px;}
.marea{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:2px;}
.marea::-webkit-scrollbar{width:3px;}
.marea::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}
.dsep{text-align:center;font-size:11px;color:var(--txt3);font-family:'Space Mono',monospace;margin:14px 0 6px;position:relative;}
.dsep::before,.dsep::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--border);}
.dsep::before{left:0;}.dsep::after{right:0;}

/* MESSAGE */
.mw{display:flex;gap:7px;max-width:72%;animation:mIn .15s ease;position:relative;}
.mw:hover .macts{opacity:1;}
@keyframes mIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.mw.me{align-self:flex-end;flex-direction:row-reverse;}
.mav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Space Mono',monospace;flex-shrink:0;margin-top:auto;overflow:hidden;}
.mav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.bbl{padding:10px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;position:relative;}
.mw:not(.me) .bbl{background:var(--s2);border:1px solid var(--border);border-bottom-left-radius:4px;}
.mw.me .bbl{background:linear-gradient(135deg,var(--acc),#5a4fd6);color:#fff;border-bottom-right-radius:4px;}
.bbl.del{opacity:.5;font-style:italic;}

/* IMAGE in bubble */
.bbl img.msgimg{max-width:220px;max-height:220px;border-radius:12px;display:block;cursor:pointer;margin:-2px 0;}
.mw.me .bbl img.msgimg{border-radius:12px 12px 4px 12px;}
.mw:not(.me) .bbl img.msgimg{border-radius:12px 12px 12px 4px;}

.mfoot{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px;}
.mtime{font-size:10px;opacity:.5;font-family:'Space Mono',monospace;}
.mtick{font-size:11px;line-height:1;}
.mtick.s{color:var(--txt3);}
.mtick.r{color:var(--acc3);}
.macts{opacity:0;transition:opacity .15s;display:flex;gap:2px;align-self:flex-end;margin-bottom:4px;}
.mab{width:24px;height:24px;border-radius:6px;border:none;background:var(--s2);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:background .15s;}
.mab:hover{background:var(--s3);}
.mab.del-btn:hover{color:var(--red);}

/* REACTIONS */
.reacts{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.react-pill{display:flex;align-items:center;gap:3px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:2px 7px;font-size:13px;cursor:pointer;transition:all .15s;user-select:none;}
.react-pill:hover{border-color:var(--acc);}
.react-pill.mine{background:#7c6aff18;border-color:var(--acc);}
.react-cnt{font-size:11px;color:var(--txt2);font-family:'Space Mono',monospace;}

/* EMOJI PICKER */
.epick{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:8px;display:flex;gap:4px;flex-wrap:wrap;max-width:220px;z-index:100;
  box-shadow:0 8px 32px rgba(0,0,0,.5);animation:mIn .12s ease;}
.epick button{width:32px;height:32px;border:none;background:transparent;font-size:18px;cursor:pointer;border-radius:7px;transition:background .1s;}
.epick button:hover{background:var(--s2);}
.epick .custom-inp{width:100%;padding:5px 8px;background:var(--s2);border:1px solid var(--border);border-radius:7px;color:var(--txt);font-size:14px;outline:none;margin-top:4px;}

.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txt3);gap:10px;}
.eico{width:60px;height:60px;border-radius:18px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:26px;}
#nochat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg);color:var(--txt3);}
.nclogo{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;
  background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* INPUT BAR */
.ibar{padding:12px 18px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:flex-end;}
.ibar-btns{display:flex;gap:6px;align-items:flex-end;}
.minp{flex:1;padding:11px 16px;background:var(--s2);border:1px solid var(--border);border-radius:22px;color:var(--txt);font-size:14px;outline:none;resize:none;max-height:110px;line-height:1.5;transition:border-color .2s;font-family:'DM Sans',sans-serif;}
.minp:focus{border-color:var(--acc);}
.minp::placeholder{color:var(--txt3);}
.sbtn{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--acc),#5a4fd6);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s,transform .1s;flex-shrink:0;}
.sbtn:hover{opacity:.9;}.sbtn:active{transform:scale(.93);}
.mbtn{width:36px;height:36px;border-radius:50%;border:none;background:var(--s2);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.mbtn:hover{background:var(--s3);color:var(--txt);}

/* MODALS */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:400px;position:relative;}
.mtit{font-size:18px;font-weight:700;margin-bottom:24px;}
.mclose{position:absolute;top:16px;right:16px;background:var(--s2);border:none;color:var(--txt2);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.mclose:hover{color:var(--txt);}
.avup{width:80px;height:80px;border-radius:50%;margin:0 auto 20px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.avup:hover::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:24px;border-radius:50%;}
.avup input{display:none;}
.bs{width:100%;padding:11px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--txt);font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;}
.bs:hover{background:var(--s3);}

/* IMAGE LIGHTBOX */
#imlb{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:2000;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
#imlb img{max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain;}
#imlb .lbclose{position:absolute;top:20px;right:20px;background:var(--s2);border:none;color:var(--txt);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}

.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .sb{width:100%;min-width:0;}
  #app.co .sb{display:none;}
  #app.co #nochat{display:none;}
  .backbtn{display:flex !important;}
}
.backbtn{display:none;}
</style>
</head>
<body>

<div id="auth">
  <div class="abox">
    <div class="logo">Wavr</div>
    <div class="asub">Мессенджер</div>
    <div class="tabs">
      <button class="tab on" onclick="stab('login')">Войти</button>
      <button class="tab" onclick="stab('reg')">Регистрация</button>
    </div>
    <div id="tlogin">
      <div class="fg"><label class="fl">Username</label><input class="fi" id="lu" placeholder="your_username" onkeydown="if(event.key==='Enter')doLogin(document.querySelector('#tlogin .bp'))"/></div>
      <div class="fg"><label class="fl">Пароль</label><input class="fi" id="lp" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin(document.querySelector('#tlogin .bp'))"/></div>
      <button class="bp" onclick="doLogin(this)">Войти</button>
      <div class="err" id="lerr"></div>
    </div>
    <div id="treg" style="display:none">
      <div class="fg"><label class="fl">Имя</label><input class="fi" id="rn" placeholder="Иван Петров"/></div>
      <div class="fg"><label class="fl">Username</label><input class="fi" id="ru" placeholder="ivan_petrov"/></div>
      <div class="fg"><label class="fl">Пароль</label><input class="fi" id="rp" type="password" placeholder="••••••••"/></div>
      <button class="bp" onclick="doReg(this)">Создать аккаунт</button>
      <div class="err" id="rerr"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="layout">
    <div class="sb" id="sb">
      <div class="sbh">
        <div class="alogo">Wavr</div>
        <div class="urow">
          <div class="av avlg avon c0" id="myav" onclick="openPM()" style="cursor:pointer"></div>
          <div class="ui" onclick="openPM()" style="cursor:pointer">
            <div class="un" id="mydn"></div>
            <div class="ut" id="myun"></div>
          </div>
          <button class="ib dng" title="Выйти" onclick="doLogout()">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="srw">
        <div class="sbox">
          <svg class="sico" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="sinp" id="sbox" placeholder="Найти пользователя..." oninput="onSearch(this.value)"/>
        </div>
      </div>
      <div id="sres"></div>
      <div class="clabel">Чаты</div>
      <div class="clist" id="clist"><div class="empty-list">Найдите кого-нибудь 💬</div></div>
    </div>

    <div id="nochat">
      <div class="nclogo">Wavr</div>
      <div style="font-size:15px;color:var(--txt2)">Выберите чат</div>
      <div style="font-size:13px">Используйте поиск слева</div>
    </div>

    <div class="cmain" id="cmain" style="display:none">
      <div class="topbar">
        <button class="ib backbtn" onclick="closeChat()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="av c0" id="tbav"></div>
        <div class="tbinfo" onclick="openUM()">
          <div class="tbname" id="tbname"></div>
          <div class="tbst" id="tbst"></div>
        </div>
        <button class="ib dng" title="Удалить чат" onclick="delChat()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
      <div class="marea" id="marea"><div class="empty-chat"><div class="eico">👋</div><div>Начните переписку!</div></div></div>
      <div class="ibar">
        <input type="file" accept="image/*" id="imgfile" style="display:none"/>
        <div class="ibar-btns">
          <button class="mbtn" title="Прикрепить фото" onclick="document.getElementById('imgfile').click()">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>
        </div>
        <textarea class="minp" id="minp" rows="1" placeholder="Написать..." onkeydown="onKey(event)" oninput="autoH(this)"></textarea>
        <button class="sbtn" onclick="sendMsg()">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="pm" style="display:none" class="mover" onclick="if(event.target===this)closePM()">
  <div class="modal">
    <button class="mclose" onclick="closePM()">✕</button>
    <div class="mtit">Мой профиль</div>
    <label class="avup avlg c0" id="pmav" style="font-size:28px">
      <input type="file" accept="image/*" id="avinp" onchange="onAvChange(event)"/>
    </label>
    <div class="fg"><label class="fl">Имя</label><input class="fi" id="pmdn"/></div>
    <div class="fg"><label class="fl">Username</label><input class="fi" id="pmun" placeholder="new_username"/></div>
    <div class="fg"><label class="fl">О себе</label><input class="fi" id="pmbio" placeholder="Расскажи о себе..."/></div>
    <button class="bp" onclick="saveP()">Сохранить</button>
    <div class="err" id="pmerr"></div>
  </div>
</div>

<!-- USER MODAL -->
<div id="um" style="display:none" class="mover" onclick="if(event.target===this)closeUM()">
  <div class="modal" style="text-align:center">
    <button class="mclose" onclick="closeUM()">✕</button>
    <div class="av c0" id="umav" style="width:70px;height:70px;font-size:24px;margin:0 auto 14px"></div>
    <div style="font-size:20px;font-weight:700;margin-bottom:4px" id="umdn"></div>
    <div style="font-size:13px;color:var(--txt2);font-family:'Space Mono',monospace;margin-bottom:12px" id="umun"></div>
    <div style="font-size:14px;color:var(--txt2);min-height:20px" id="umbio"></div>
  </div>
</div>

<!-- IMAGE LIGHTBOX -->
<div id="imlb" onclick="closeImlb()">
  <button class="lbclose" onclick="closeImlb()">✕</button>
  <img id="lbimg" src=""/>
</div>

<!-- EMOJI PICKER (global) -->
<div id="epick" style="display:none"></div>

<script>
// ── STATE ──────────────────────────────────────────────
let me=null, token=null, chatWith=null, pollTid=null;
let lastTs=0, seenIds=new Set(), myMsgIds=new Set();

const EMOJIS = ['👍','❤️','😂','😮','😢','🔥','👎','🎉','😍','💀'];
const AVC=['c0','c1','c2','c3','c4'];
const avc=u=>AVC[(u||'').split('').reduce((h,c)=>(h*31+c.charCodeAt(0))&0xffff,0)%AVC.length];
const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ft=ts=>{const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');};
const fd=ts=>new Date(ts).toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
function hdrs(){return{'Content-Type':'application/json','x-token':token||''};}

function avHtml(av,cls,u,dn,sz=''){
  const s=sz?`style="width:${sz};height:${sz}"`:'';
  return av?`<div class="av ${cls}" ${s}><img src="${esc(av)}"/></div>`
           :`<div class="av ${cls}" ${s}>${ini(dn||u)}</div>`;
}
function setAv(el,av,cls,dn){
  el.className=`av ${cls}`;
  el.innerHTML=av?`<img src="${esc(av)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`
                 :ini(dn);
}

// ── AUTH ───────────────────────────────────────────────
function stab(t){
  document.getElementById('tlogin').style.display=t==='login'?'':'none';
  document.getElementById('treg').style.display=t==='reg'?'':'none';
  document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('on',(t==='login'&&i===0)||(t==='reg'&&i===1)));
}
async function doLogin(btn){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value;
  const el=document.getElementById('lerr');el.textContent='';
  if(!u||!p){el.textContent='Заполните все поля';return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:hdrs(),body:JSON.stringify({username:u,password:p})});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    me=d.user;token=d.token;ss();enterApp();
  }catch(e){el.textContent=e.message;}
  finally{btn.disabled=false;btn.textContent='Войти';}
}
async function doReg(btn){
  const dn=document.getElementById('rn').value.trim();
  const u=document.getElementById('ru').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const p=document.getElementById('rp').value;
  const el=document.getElementById('rerr');el.textContent='';
  if(!dn||!u||!p){el.textContent='Заполните все поля';return;}
  if(u.length<3){el.textContent='Username минимум 3 символа';return;}
  if(p.length<6){el.textContent='Пароль минимум 6 символов';return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    const r=await fetch('/api/register',{method:'POST',headers:hdrs(),body:JSON.stringify({username:u,password:p,displayname:dn})});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    me=d.user;token=d.token;ss();enterApp();
  }catch(e){el.textContent=e.message;}
  finally{btn.disabled=false;btn.textContent='Создать аккаунт';}
}
async function doLogout(){
  try{await fetch('/api/logout',{method:'POST',headers:hdrs()});}catch(e){}
  sessionStorage.removeItem('wavr');me=null;token=null;chatWith=null;
  clearInterval(pollTid);
  document.getElementById('app').style.display='none';
  document.getElementById('auth').style.display='flex';
}
function ss(){sessionStorage.setItem('wavr',JSON.stringify({me,token}));}

function enterApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='block';
  setAv(document.getElementById('myav'),me.avatar,`avlg avon ${avc(me.username)}`,me.displayname);
  document.getElementById('mydn').textContent=me.displayname;
  document.getElementById('myun').textContent='@'+me.username;
  loadChats();
  clearInterval(pollTid);
  pollTid=setInterval(tick,1000);
}

async function tick(){
  if(chatWith) await fetchMsgs(false);
  loadChats();
}

// ── PROFILE ────────────────────────────────────────────
function openPM(){
  document.getElementById('pmdn').value=me.displayname||'';
  document.getElementById('pmun').value=me.username||'';
  document.getElementById('pmbio').value=me.bio||'';
  setAv(document.getElementById('pmav'),me.avatar,`avup avlg ${avc(me.username)}`,me.displayname);
  document.getElementById('pmav').style.fontSize='28px';
  document.getElementById('pmerr').textContent='';
  document.getElementById('pm').style.display='flex';
}
function closePM(){document.getElementById('pm').style.display='none';}

let newAv=null;
function onAvChange(e){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const M=256;let w=img.width,h=img.height;
      if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      newAv=c.toDataURL('image/jpeg',.85);
      const av=document.getElementById('pmav');
      av.innerHTML=`<img src="${newAv}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
      const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
      inp.onchange=onAvChange;inp.style.display='none';av.appendChild(inp);av.onclick=()=>inp.click();
    };img.src=ev.target.result;
  };rd.readAsDataURL(f);
}
async function saveP(){
  const dn=document.getElementById('pmdn').value.trim();
  const bio=document.getElementById('pmbio').value.trim();
  const nu=document.getElementById('pmun').value.trim().toLowerCase();
  const el=document.getElementById('pmerr');el.textContent='';
  if(!dn){el.textContent='Имя не может быть пустым';return;}
  try{
    const body={displayname:dn,bio,avatar:newAv||me.avatar||null};
    if(nu&&nu!==me.username)body.newUsername=nu;
    const r=await fetch('/api/profile',{method:'POST',headers:hdrs(),body:JSON.stringify(body)});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    me.displayname=dn;me.bio=bio;if(newAv)me.avatar=newAv;
    if(d.username&&d.username!==me.username){me.username=d.username;document.getElementById('myun').textContent='@'+me.username;}
    newAv=null;ss();
    setAv(document.getElementById('myav'),me.avatar,`avlg avon ${avc(me.username)}`,me.displayname);
    document.getElementById('mydn').textContent=me.displayname;
    closePM();
  }catch(e){el.textContent=e.message;}
}
async function openUM(){
  if(!chatWith)return;
  try{
    const r=await fetch(`/api/profile/${chatWith.username}`,{headers:hdrs()});
    const d=await r.json();const u=d.user||chatWith;
    setAv(document.getElementById('umav'),u.avatar,`av ${avc(u.username)}`,u.displayname);
    document.getElementById('umav').style.cssText='width:70px;height:70px;font-size:24px;margin:0 auto 14px';
    document.getElementById('umdn').textContent=u.displayname||chatWith.displayname;
    document.getElementById('umun').textContent='@'+(u.username||chatWith.username);
    document.getElementById('umbio').textContent=u.bio||'';
    document.getElementById('um').style.display='flex';
  }catch(e){}
}
function closeUM(){document.getElementById('um').style.display='none';}

// ── SEARCH ─────────────────────────────────────────────
let stid=null;
function onSearch(v){
  clearTimeout(stid);
  const el=document.getElementById('sres');
  if(!v.trim()){el.style.display='none';el.innerHTML='';return;}
  stid=setTimeout(()=>doSearch(v),300);
}
async function doSearch(q){
  const el=document.getElementById('sres');
  try{
    const r=await fetch(`/api/search?q=${encodeURIComponent(q)}`,{headers:hdrs()});
    const d=await r.json();
    if(!d.users?.length){el.style.display='block';el.innerHTML='<div style="padding:10px 14px;font-size:13px;color:var(--txt3)">Не найдено</div>';return;}
    el.style.display='block';
    el.innerHTML=d.users.map(u=>`<div class="sri" onclick="openChat('${u.username}','${esc(u.displayname)}','${esc(u.avatar||'')}')">
      ${avHtml(u.avatar,`av ${avc(u.username)}`,u.username,u.displayname,'30px')}
      <div><div style="font-size:14px;font-weight:500">${esc(u.displayname)}</div><div style="font-size:12px;color:var(--txt2);font-family:'Space Mono',monospace">@${esc(u.username)}</div></div>
    </div>`).join('');
  }catch(e){}
}

// ── CHATS ──────────────────────────────────────────────
async function loadChats(){
  try{
    const r=await fetch('/api/chats',{headers:hdrs()});
    const d=await r.json();renderChats(d.chats||[]);
  }catch(e){}
}
function renderChats(list){
  const el=document.getElementById('clist');
  if(!list.length){el.innerHTML='<div class="empty-list">Найдите кого-нибудь 💬</div>';return;}
  el.innerHTML=list.map(c=>{
    const act=chatWith?.username===c.otherUsername;
    return `<div class="ci ${act?'act':''}" onclick="openChat('${c.otherUsername}','${esc(c.otherDisplayname)}','${esc(c.otherAvatar||'')}')">
      ${avHtml(c.otherAvatar,`av ${avc(c.otherUsername)}`,c.otherUsername,c.otherDisplayname)}
      <div class="cinfo"><div class="cname">${esc(c.otherDisplayname)}</div><div class="cprev">${esc(c.lastMessage||'')}</div></div>
      <div class="cmeta">
        <div class="ctime">${c.lastTs?ft(c.lastTs):''}</div>
        ${c.unread?`<div class="badge">${c.unread}</div>`:''}
      </div>
      <button class="cdel" onclick="event.stopPropagation();delChatFrom('${c.otherUsername}')" title="Удалить">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      </button>
    </div>`;
  }).join('');
}

// ── OPEN/CLOSE CHAT ────────────────────────────────────
async function openChat(username,displayname,avatar=''){
  document.getElementById('sbox').value='';
  document.getElementById('sres').style.display='none';
  chatWith={username,displayname,avatar};lastTs=0;seenIds=new Set();myMsgIds=new Set();
  setAv(document.getElementById('tbav'),avatar||null,`av ${avc(username)}`,displayname);
  document.getElementById('tbname').textContent=displayname;
  document.getElementById('tbst').textContent='@'+username;
  document.getElementById('nochat').style.display='none';
  document.getElementById('cmain').style.display='flex';
  document.getElementById('app').classList.add('co');
  document.getElementById('marea').innerHTML='<div style="text-align:center;padding:40px"><span class="spin" style="border-color:var(--border);border-top-color:var(--acc)"></span></div>';
  await fetchMsgs(true);
  markRead(username);
  loadChats();
}
function closeChat(){
  chatWith=null;
  document.getElementById('cmain').style.display='none';
  document.getElementById('nochat').style.display='flex';
  document.getElementById('app').classList.remove('co');
}

// ── MESSAGES ───────────────────────────────────────────
async function markRead(other){
  try{await fetch('/api/read',{method:'POST',headers:hdrs(),body:JSON.stringify({other})});}catch(e){}
}

async function fetchMsgs(full){
  if(!chatWith)return;
  try{
    // Используем lastTs-1 чтобы не пропустить сообщения с тем же timestamp
    const since=full?0:Math.max(0,lastTs-1);
    const url=`/api/messages?b=${encodeURIComponent(chatWith.username)}&since=${since}`;
    const r=await fetch(url,{headers:hdrs()});
    const d=await r.json();
    const msgs=d.messages||[];
    if(msgs.length){
      // Берём максимальный ts из всех полученных сообщений
      const maxTs=Math.max(...msgs.map(m=>m.ts));
      if(maxTs>lastTs)lastTs=maxTs;
      full?renderAll(msgs):appendNew(msgs);
      if(msgs.some(m=>m.from!==me.username))markRead(chatWith.username);
    }else if(full){
      document.getElementById('marea').innerHTML='<div class="empty-chat"><div class="eico">👋</div><div>Начните переписку!</div></div>';
    }
    if(!full)syncTicks(msgs);
  }catch(e){}
}

function syncTicks(msgs){
  for(const m of msgs){
    if(m.from===me.username){
      const tick=document.querySelector(`[data-id="${m.id}"] .mtick`);
      if(tick){
        const rd=m.read_at>0;
        tick.textContent=rd?'✓✓':'✓';
        tick.className='mtick '+(rd?'r':'s');
      }
    }
    // Обновляем реакции
    const rw=document.querySelector(`[data-id="${m.id}"] .reacts`);
    if(rw)rw.outerHTML=reactsHtml(m.id,m.reactions);
  }
}

function renderAll(msgs){
  const a=document.getElementById('marea');
  let h='',ld=null;
  for(const m of msgs){
    seenIds.add(m.id);
    if(m.from===me.username)myMsgIds.add(m.id);
    const d=fd(m.ts);if(d!==ld){h+=`<div class="dsep">${d}</div>`;ld=d;}
    h+=msgHtml(m);
  }
  a.innerHTML=h;a.scrollTop=a.scrollHeight;
}

function appendNew(msgs){
  const fresh=msgs.filter(m=>!seenIds.has(m.id));
  if(!fresh.length)return;
  const a=document.getElementById('marea');
  const atBottom=a.scrollHeight-a.scrollTop-a.clientHeight<100;
  const emp=a.querySelector('.empty-chat');if(emp)emp.remove();
  fresh.forEach(m=>{
    seenIds.add(m.id);
    if(m.from===me.username)myMsgIds.add(m.id);
    a.insertAdjacentHTML('beforeend',msgHtml(m));
  });
  if(atBottom)a.scrollTop=a.scrollHeight;
}

function msgHtml(m){
  const isMe=m.from===me.username;
  const ac=avc(m.from);
  const avEl=isMe
    ?avHtml(me.avatar,`mav ${ac}`,me.username,me.displayname)
    :avHtml(chatWith?.avatar||null,`mav ${ac}`,m.from,m.displayname||m.from);

  const delBtn=isMe&&!m.deleted
    ?`<button class="mab del-btn" onclick="delMsg(${m.id})" title="Удалить"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>`:'';
  const reactBtn=!m.deleted
    ?`<button class="mab" onclick="showPicker(event,${m.id})" title="Реакция">😊</button>`:'';

  const ticks=isMe&&!m.deleted
    ?`<span class="mtick ${m.read_at>0?'r':'s'}">${m.read_at>0?'✓✓':'✓'}</span>`:'';

  let content='';
  if(m.deleted){
    content=`<div class="bbl del">Сообщение удалено</div>`;
  }else if(m.type==='image'){
    content=`<div class="bbl" style="padding:6px"><img class="msgimg" src="${esc(m.text)}" onclick="openImg('${esc(m.text)}')" loading="lazy"/></div>`;
  }else{
    content=`<div class="bbl">${esc(m.text)}</div>`;
  }

  return `<div class="mw ${isMe?'me':''}" data-id="${m.id}">
    ${!isMe?avEl:''}
    ${isMe?`<div class="macts">${reactBtn}${delBtn}</div>`:''}
    <div>
      ${content}
      <div class="mfoot"><span class="mtime">${ft(m.ts)}</span>${ticks}</div>
      ${reactsHtml(m.id,m.reactions)}
    </div>
    ${isMe?avEl:''}
    ${!isMe?`<div class="macts">${reactBtn}${delBtn}</div>`:''}
  </div>`;
}

function reactsHtml(msgId,reactions){
  if(!reactions||!Object.keys(reactions).length)return`<div class="reacts" data-rid="${msgId}"></div>`;
  const pills=Object.entries(reactions).map(([e,users])=>{
    const mine=users.includes(me?.username);
    const cnt=users.length;
    return `<span class="react-pill ${mine?'mine':''}" onclick="doReact(${msgId},'${e}')" title="${users.join(', ')}">${e}<span class="react-cnt">${cnt}</span></span>`;
  }).join('');
  return`<div class="reacts" data-rid="${msgId}">${pills}</div>`;
}

// ── EMOJI PICKER ───────────────────────────────────────
let pickerTarget=null;
function showPicker(e,msgId){
  e.stopPropagation();
  closePicker();
  pickerTarget=msgId;
  const pick=document.getElementById('epick');
  const emojiBtns=EMOJIS.map(em=>`<button onclick="doReact(${msgId},'${em}');closePicker()">${em}</button>`).join('');
  pick.innerHTML=`${emojiBtns}<input class="custom-inp" placeholder="Свой эмодзи..." maxlength="4" id="cemoji" onkeydown="if(event.key==='Enter'){doReact(${msgId},this.value.trim());closePicker();}"/>`;
  // Позиционируем у кнопки
  const rect=e.currentTarget.getBoundingClientRect();
  pick.style.display='flex';
  pick.style.flexWrap='wrap';
  pick.style.left=Math.min(rect.left,window.innerWidth-230)+'px';
  pick.style.top=(rect.top-10-pick.offsetHeight||rect.top-130)+'px';
  pick.style.position='fixed';
  // Пересчитываем после появления
  setTimeout(()=>{
    const ph=pick.offsetHeight;
    pick.style.top=Math.max(10,rect.top-ph-6)+'px';
  },0);
  setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),0);
}
function closePicker(){
  document.getElementById('epick').style.display='none';
  pickerTarget=null;
}
async function doReact(msgId,emoji){
  if(!emoji||!emoji.trim())return;
  const em=emoji.trim();
  if([...em].length>2)return;
  try{
    const r=await fetch('/api/react',{method:'POST',headers:hdrs(),body:JSON.stringify({id:msgId,emoji:em})});
    const d=await r.json();
    if(d.ok){
      const rw=document.querySelector(`[data-rid="${msgId}"]`);
      if(rw)rw.outerHTML=reactsHtml(msgId,d.reactions);
    }
  }catch(e){}
}

// ── SEND ───────────────────────────────────────────────
async function sendMsg(){
  if(!chatWith)return;
  const inp=document.getElementById('minp');
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='';
  try{
    const r=await fetch('/api/send',{method:'POST',headers:hdrs(),body:JSON.stringify({to:chatWith.username,text})});
    const d=await r.json();
    if(d.ok){
      const fake={id:d.id,from:me.username,displayname:me.displayname,text,type:'text',ts:d.ts,deleted:false,read_at:0,reactions:{}};
      seenIds.add(d.id);myMsgIds.add(d.id);
      appendNew([fake]);lastTs=Math.max(lastTs,d.ts);
      loadChats();
    }
  }catch(e){}
}

function onImgPick(e){
  const f=e.target.files[0];if(!f||!chatWith)return;
  e.target.value='';
  if(f.size>15*1024*1024){alert('Файл слишком большой (макс 15MB)');return;}
  const rd=new FileReader();
  rd.onload=async ev=>{
    // Сжимаем если большое
    const img=new Image();
    img.onload=async()=>{
      const c=document.createElement('canvas');
      const M=1280;let w=img.width,h=img.height;
      if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      const data=c.toDataURL('image/jpeg',.88);
      try{
        const r=await fetch('/api/send',{method:'POST',headers:hdrs(),body:JSON.stringify({to:chatWith.username,text:data,type:'image'})});
        const d=await r.json();
        if(d.ok){
          const fake={id:d.id,from:me.username,displayname:me.displayname,text:data,type:'image',ts:d.ts,deleted:false,read_at:0,reactions:{}};
          seenIds.add(d.id);myMsgIds.add(d.id);
          appendNew([fake]);lastTs=Math.max(lastTs,d.ts);
          loadChats();
        }
      }catch(e){}
    };img.src=ev.target.result;
  };rd.readAsDataURL(f);
}

function openImg(src){
  document.getElementById('lbimg').src=src;
  document.getElementById('imlb').style.display='flex';
}
function closeImlb(){
  document.getElementById('imlb').style.display='none';
  document.getElementById('lbimg').src='';
}

async function delMsg(id){
  try{
    const r=await fetch(`/api/message/${id}`,{method:'DELETE',headers:hdrs()});
    if(r.ok){
      const w=document.querySelector(`[data-id="${id}"]`);
      if(w){
        const b=w.querySelector('.bbl');
        if(b){b.className='bbl del';b.textContent='Сообщение удалено';}
        w.querySelectorAll('.mab').forEach(btn=>btn.remove());
      }
      loadChats();
    }
  }catch(e){}
}
async function delChat(){
  if(!chatWith)return;
  try{
    await fetch(`/api/chat/${chatWith.username}`,{method:'DELETE',headers:hdrs()});
    closeChat();loadChats();
  }catch(e){}
}
async function delChatFrom(u){
  try{
    await fetch(`/api/chat/${u}`,{method:'DELETE',headers:hdrs()});
    if(chatWith?.username===u)closeChat();
    loadChats();
  }catch(e){}
}

function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function autoH(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}

// ── BOOT ───────────────────────────────────────────────
document.getElementById('imgfile').addEventListener('change', onImgPick);
const sv=sessionStorage.getItem('wavr');
if(sv){try{const s=JSON.parse(sv);me=s.me;token=s.token;enterApp();}catch(e){}}
</script>
</body>
