<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wavr</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a24; --surface3:#22222f;
      --border:#2a2a3a; --accent:#7c6aff; --accent2:#ff6a9b; --accent3:#6affce;
      --text:#e8e8f0; --text2:#8888aa; --text3:#4a4a66; --online:#4ade80; --red:#ff4a6a;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.3;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");}

    #auth{display:flex;align-items:center;justify-content:center;height:100dvh;
      background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a1030 0%,var(--bg) 70%);}
    .auth-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;
      padding:48px 40px;width:100%;max-width:420px;position:relative;overflow:hidden;}
    .auth-box::before{content:'';position:absolute;top:-80px;left:-80px;width:220px;height:220px;
      background:radial-gradient(circle,#7c6aff22,transparent 70%);pointer-events:none;}
    .logo{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;letter-spacing:-1px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
    .auth-sub{color:var(--text2);font-size:14px;margin-bottom:32px;}
    .tabs{display:flex;gap:4px;background:var(--surface2);border-radius:8px;padding:4px;margin-bottom:24px;}
    .tab{flex:1;padding:8px;border:none;background:transparent;color:var(--text2);
      font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .2s;}
    .tab.active{background:var(--surface3);color:var(--text);}
    .form-group{margin-bottom:14px;}
    .form-label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:7px;}
    .form-input{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-family:'Space Mono',monospace;font-size:14px;outline:none;transition:border-color .2s;}
    .form-input:focus{border-color:var(--accent);}
    .form-input::placeholder{color:var(--text3);}
    .btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#5a4fd6);
      border:none;border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;
      font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .2s,transform .1s;}
    .btn-primary:hover{opacity:.9;}.btn-primary:active{transform:scale(.98);}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
    .err{color:var(--accent2);font-size:13px;margin-top:10px;text-align:center;min-height:18px;}

    #app{display:none;height:100dvh;flex-direction:row;}

    .sidebar{width:300px;min-width:300px;background:var(--surface);border-right:1px solid var(--border);
      display:flex;flex-direction:column;height:100dvh;}
    .sb-head{padding:18px 18px 14px;border-bottom:1px solid var(--border);}
    .app-logo{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;
      background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
    .user-row{display:flex;align-items:center;gap:10px;}
    .av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-family:'Space Mono',monospace;font-size:13px;font-weight:700;flex-shrink:0;position:relative;overflow:hidden;}
    .av img{width:100%;height:100%;object-fit:cover;}
    .av-lg{width:42px;height:42px;font-size:15px;}
    .av-online::after{content:'';position:absolute;bottom:1px;right:1px;width:9px;height:9px;
      background:var(--online);border-radius:50%;border:2px solid var(--surface);}
    .av-purple{background:#7c6aff22;color:var(--accent);}
    .av-pink{background:#ff6a9b22;color:var(--accent2);}
    .av-green{background:#6affce22;color:var(--accent3);}
    .av-orange{background:#ffaa6a22;color:#ffaa6a;}
    .av-blue{background:#6ab8ff22;color:#6ab8ff;}
    .u-info{flex:1;min-width:0;}
    .u-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .u-tag{font-size:12px;color:var(--text2);font-family:'Space Mono',monospace;}
    .icon-btn{width:30px;height:30px;border-radius:7px;border:none;background:var(--surface2);
      color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
    .icon-btn:hover{background:var(--surface3);color:var(--text);}
    .icon-btn.danger:hover{background:#ff4a6a22;color:var(--red);}

    .search-wrap{padding:10px 14px;border-bottom:1px solid var(--border);}
    .search-box{position:relative;}
    .search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
    .search-input{width:100%;padding:9px 14px 9px 34px;background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
    .search-input:focus{border-color:var(--accent);}
    .search-input::placeholder{color:var(--text3);}

    #search-results{display:none;padding:6px;border-bottom:1px solid var(--border);}
    .sr-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:background .15s;}
    .sr-item:hover{background:var(--surface2);}
    .sr-name{font-size:14px;font-weight:500;}
    .sr-tag{font-size:12px;color:var(--text2);font-family:'Space Mono',monospace;}

    .chats-label{padding:10px 16px 5px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
    .chats-list{flex:1;overflow-y:auto;padding:4px 6px;}
    .chats-list::-webkit-scrollbar{width:3px;}
    .chats-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
    .chat-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .15s;position:relative;}
    .chat-item:hover{background:var(--surface2);}
    .chat-item:hover .chat-del{opacity:1;}
    .chat-item.active{background:var(--surface3);}
    .chat-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
      width:3px;height:60%;background:var(--accent);border-radius:0 3px 3px 0;}
    .c-info{flex:1;min-width:0;}
    .c-name{font-size:14px;font-weight:600;}
    .c-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
    .c-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
    .c-time{font-size:11px;color:var(--text3);}
    .badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;}
    .empty-list{padding:28px 14px;text-align:center;color:var(--text3);font-size:13px;line-height:1.6;}
    .chat-del{opacity:0;transition:opacity .15s;background:transparent;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;}
    .chat-del:hover{color:var(--red);}

    .chat-main{flex:1;display:flex;flex-direction:column;min-width:0;}
    .topbar{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);}
    .tb-info{flex:1;cursor:pointer;}
    .tb-name{font-size:15px;font-weight:600;}
    .tb-status{font-size:12px;color:var(--text2);margin-top:1px;}
    .msgs-area{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:3px;}
    .msgs-area::-webkit-scrollbar{width:3px;}
    .msgs-area::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
    .day-sep{text-align:center;font-size:11px;color:var(--text3);font-family:'Space Mono',monospace;
      margin:14px 0 6px;position:relative;}
    .day-sep::before,.day-sep::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--border);}
    .day-sep::before{left:0;}.day-sep::after{right:0;}
    .msg-wrap{display:flex;gap:7px;max-width:70%;animation:mIn .2s ease;position:relative;}
    .msg-wrap:hover .msg-actions{opacity:1;}
    @keyframes mIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg-wrap.me{align-self:flex-end;flex-direction:row-reverse;}
    .msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:10px;font-weight:700;font-family:'Space Mono',monospace;flex-shrink:0;margin-top:auto;overflow:hidden;}
    .msg-av img{width:100%;height:100%;object-fit:cover;}
    .bubble{padding:10px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
    .msg-wrap:not(.me) .bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;}
    .msg-wrap.me .bubble{background:linear-gradient(135deg,var(--accent),#5a4fd6);color:#fff;border-bottom-right-radius:4px;}
    .bubble.deleted{opacity:.5;font-style:italic;}
    .msg-time{font-size:10px;margin-top:3px;opacity:.5;font-family:'Space Mono',monospace;}
    .msg-wrap.me .msg-time{text-align:right;}
    .msg-actions{opacity:0;transition:opacity .15s;display:flex;gap:2px;align-self:center;}
    .msg-act-btn{width:22px;height:22px;border-radius:5px;border:none;background:var(--surface2);
      color:var(--text2);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;}
    .msg-act-btn:hover{background:var(--surface3);color:var(--red);}
    .empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px;}
    .empty-ico{width:60px;height:60px;border-radius:18px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:26px;}

    #no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg);color:var(--text3);}
    .nc-logo{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;
      background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

    .input-bar{padding:14px 20px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:10px;align-items:flex-end;}
    .msg-input{flex:1;padding:11px 16px;background:var(--surface2);border:1px solid var(--border);
      border-radius:22px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
      outline:none;resize:none;max-height:110px;line-height:1.5;transition:border-color .2s;}
    .msg-input:focus{border-color:var(--accent);}
    .msg-input::placeholder{color:var(--text3);}
    .send-btn{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),#5a4fd6);
      color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s,transform .1s;flex-shrink:0;}
    .send-btn:hover{opacity:.9;}.send-btn:active{transform:scale(.93);}

    /* PROFILE MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:400px;position:relative;}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:24px;}
    .modal-close{position:absolute;top:16px;right:16px;background:var(--surface2);border:none;color:var(--text2);
      width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
    .modal-close:hover{color:var(--text);}
    .av-upload{width:80px;height:80px;border-radius:50%;margin:0 auto 20px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .av-upload:hover::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:24px;border-radius:50%;}
    .av-upload input{display:none;}
    .btn-secondary{width:100%;padding:11px;background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;}
    .btn-secondary:hover{background:var(--surface3);}
    .btn-danger{background:#ff4a6a22;border-color:#ff4a6a44;color:var(--red);}
    .btn-danger:hover{background:#ff4a6a33;}

    .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:640px){
      .sidebar{width:100%;min-width:0;}
      #app.chat-open .sidebar{display:none;}
      #app.chat-open #no-chat{display:none;}
      .back-btn{display:flex !important;}
    }
    .back-btn{display:none;}
  </style>
</head>
<body>

<div id="auth">
  <div class="auth-box">
    <div class="logo">Wavr</div>
    <div class="auth-sub">Мессенджер</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Войти</button>
      <button class="tab" onclick="switchTab('reg')">Регистрация</button>
    </div>
    <div id="tab-login">
      <div class="form-group"><label class="form-label">Username</label>
        <input class="form-input" id="l-user" type="text" placeholder="your_username" /></div>
      <div class="form-group"><label class="form-label">Пароль</label>
        <input class="form-input" id="l-pass" type="password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter') doLogin(document.querySelector('#tab-login .btn-primary'))" /></div>
      <button class="btn-primary" onclick="doLogin(this)">Войти</button>
      <div class="err" id="l-err"></div>
    </div>
    <div id="tab-reg" style="display:none">
      <div class="form-group"><label class="form-label">Имя</label>
        <input class="form-input" id="r-name" type="text" placeholder="Иван Петров" /></div>
      <div class="form-group"><label class="form-label">Username</label>
        <input class="form-input" id="r-user" type="text" placeholder="ivan_petrov" /></div>
      <div class="form-group"><label class="form-label">Пароль</label>
        <input class="form-input" id="r-pass" type="password" placeholder="••••••••" /></div>
      <button class="btn-primary" onclick="doRegister(this)">Создать аккаунт</button>
      <div class="err" id="r-err"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="app-logo">Wavr</div>
      <div class="user-row">
        <div class="av av-lg av-online av-purple" id="my-av" onclick="openProfileModal()" style="cursor:pointer"></div>
        <div class="u-info" onclick="openProfileModal()" style="cursor:pointer">
          <div class="u-name" id="my-dn"></div>
          <div class="u-tag" id="my-un"></div>
        </div>
        <button class="icon-btn danger" title="Выйти" onclick="doLogout()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-ico" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" id="s-box" type="text" placeholder="Найти пользователя..." oninput="onSearch(this.value)" />
      </div>
    </div>
    <div id="search-results"></div>
    <div class="chats-label">Чаты</div>
    <div class="chats-list" id="chats-list">
      <div class="empty-list">Найдите кого-нибудь через поиск 💬</div>
    </div>
  </div>

  <div id="no-chat">
    <div class="nc-logo">Wavr</div>
    <div style="font-size:15px;color:var(--text2)">Выберите чат</div>
    <div style="font-size:13px">Используйте поиск слева</div>
  </div>

  <div class="chat-main" id="chat-main" style="display:none">
    <div class="topbar">
      <button class="icon-btn back-btn" onclick="closeChat()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="av av-purple" id="tb-av"></div>
      <div class="tb-info" onclick="openUserProfile()">
        <div class="tb-name" id="tb-name"></div>
        <div class="tb-status" id="tb-status"></div>
      </div>
      <button class="icon-btn danger" title="Удалить чат" onclick="deleteChat()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
    <div class="msgs-area" id="msgs-area">
      <div class="empty-chat"><div class="empty-ico">👋</div><div>Начните переписку!</div></div>
    </div>
    <div class="input-bar">
      <textarea class="msg-input" id="msg-in" rows="1" placeholder="Написать..." onkeydown="onKey(event)" oninput="autoH(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profile-modal" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeProfileModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeProfileModal()">✕</button>
    <div class="modal-title" id="pm-title">Мой профиль</div>
    <label class="av-upload av-lg av-purple" id="pm-av" style="font-size:28px">
      <input type="file" accept="image/*" onchange="onAvatarChange(event)" id="av-input" />
    </label>
    <div class="form-group"><label class="form-label">Имя</label>
      <input class="form-input" id="pm-dn" type="text" /></div>
    <div class="form-group"><label class="form-label">О себе</label>
      <input class="form-input" id="pm-bio" type="text" placeholder="Расскажи о себе..." /></div>
    <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
    <div class="err" id="pm-err"></div>
  </div>
</div>

<!-- USER VIEW MODAL -->
<div id="user-modal" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeUserModal()">
  <div class="modal" style="text-align:center">
    <button class="modal-close" onclick="closeUserModal()">✕</button>
    <div class="av av-lg av-purple" id="um-av" style="width:70px;height:70px;font-size:24px;margin:0 auto 14px"></div>
    <div style="font-size:20px;font-weight:700;margin-bottom:4px" id="um-dn"></div>
    <div style="font-size:13px;color:var(--text2);font-family:'Space Mono',monospace;margin-bottom:12px" id="um-un"></div>
    <div style="font-size:14px;color:var(--text2);min-height:20px" id="um-bio"></div>
  </div>
</div>

<script>
const API = '';
let me = null, token = null, chatWith = null, pollTid = null, lastTs = 0, seenIds = new Set();
const AVC = ['av-purple','av-pink','av-green','av-orange','av-blue'];
const avc = u => AVC[(u||'').split('').reduce((h,c)=>(h*31+c.charCodeAt(0))&0xffff,0) % AVC.length];
const ini = n => (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const ft  = ts => { const d=new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };
const fd  = ts => new Date(ts).toLocaleDateString('ru-RU',{day:'numeric',month:'long'});

function hdrs() { return {'Content-Type':'application/json','x-token': token||''}; }

function avHtml(av, cls, username, displayname, size='') {
  const sty = size ? `style="width:${size};height:${size}"` : '';
  if (av) return `<div class="av ${cls}" ${sty}><img src="${esc(av)}" /></div>`;
  return `<div class="av ${cls}" ${sty}>${ini(displayname||username)}</div>`;
}

function setAvEl(el, av, cls, displayname) {
  el.className = `av ${cls}`;
  el.innerHTML = av ? `<img src="${esc(av)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>` : ini(displayname);
}

function switchTab(t) {
  document.getElementById('tab-login').style.display = t==='login'?'':'none';
  document.getElementById('tab-reg').style.display   = t==='reg'?'':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='login'&&i===0)||(t==='reg'&&i===1)));
}

async function doLogin(btn) {
  const u = document.getElementById('l-user').value.trim().toLowerCase();
  const p = document.getElementById('l-pass').value;
  const errEl = document.getElementById('l-err'); errEl.textContent='';
  if(!u||!p){errEl.textContent='Заполните все поля';return;}
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  try {
    const r = await fetch('/api/login',{method:'POST',headers:hdrs(),body:JSON.stringify({username:u,password:p})});
    const d = await r.json(); if(!r.ok) throw new Error(d.error);
    me=d.user; token=d.token;
    sessionStorage.setItem('wavr',JSON.stringify({me,token})); enterApp();
  } catch(e){errEl.textContent=e.message;}
  finally{btn.disabled=false;btn.textContent='Войти';}
}

async function doRegister(btn) {
  const dn = document.getElementById('r-name').value.trim();
  const u  = document.getElementById('r-user').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const p  = document.getElementById('r-pass').value;
  const errEl = document.getElementById('r-err'); errEl.textContent='';
  if(!dn||!u||!p){errEl.textContent='Заполните все поля';return;}
  if(u.length<3){errEl.textContent='Username минимум 3 символа';return;}
  if(p.length<6){errEl.textContent='Пароль минимум 6 символов';return;}
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  try {
    const r = await fetch('/api/register',{method:'POST',headers:hdrs(),body:JSON.stringify({username:u,password:p,displayname:dn})});
    const d = await r.json(); if(!r.ok) throw new Error(d.error);
    me=d.user; token=d.token;
    sessionStorage.setItem('wavr',JSON.stringify({me,token})); enterApp();
  } catch(e){errEl.textContent=e.message;}
  finally{btn.disabled=false;btn.textContent='Создать аккаунт';}
}

async function doLogout(){
  try { await fetch('/api/logout',{method:'POST',headers:hdrs()}); } catch(e){}
  sessionStorage.removeItem('wavr'); me=null; token=null; chatWith=null;
  clearInterval(pollTid);
  document.getElementById('app').style.display='none';
  document.getElementById('auth').style.display='flex';
}

function enterApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='flex';
  const av=document.getElementById('my-av');
  setAvEl(av, me.avatar, `av-lg av-online ${avc(me.username)}`, me.displayname);
  document.getElementById('my-dn').textContent=me.displayname;
  document.getElementById('my-un').textContent='@'+me.username;
  loadChats();
  clearInterval(pollTid);
  pollTid=setInterval(()=>{ if(chatWith) fetchMsgs(false); loadChats(); }, 2000);
}

// PROFILE MODAL
function openProfileModal() {
  document.getElementById('pm-title').textContent = 'Мой профиль';
  document.getElementById('pm-dn').value = me.displayname || '';
  document.getElementById('pm-bio').value = me.bio || '';
  const av = document.getElementById('pm-av');
  setAvEl(av, me.avatar, `av-upload av-lg ${avc(me.username)}`, me.displayname);
  av.style.fontSize='28px'; av.style.margin='0 auto 20px';
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.onchange=onAvatarChange;
  inp.style.display='none'; av.appendChild(inp);
  av.onclick = () => inp.click();
  document.getElementById('pm-err').textContent='';
  document.getElementById('profile-modal').style.display='flex';
}
function closeProfileModal(){ document.getElementById('profile-modal').style.display='none'; }

let newAvatar = null;
function onAvatarChange(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    newAvatar = ev.target.result;
    const av = document.getElementById('pm-av');
    av.innerHTML = `<img src="${newAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
    const inp = document.createElement('input');
    inp.type='file'; inp.accept='image/*'; inp.onchange=onAvatarChange; inp.style.display='none';
    av.appendChild(inp); av.onclick=()=>inp.click();
  };
  reader.readAsDataURL(file);
}

async function saveProfile() {
  const dn = document.getElementById('pm-dn').value.trim();
  const bio = document.getElementById('pm-bio').value.trim();
  const errEl = document.getElementById('pm-err'); errEl.textContent='';
  if(!dn){errEl.textContent='Имя не может быть пустым';return;}
  try {
    const r = await fetch('/api/profile',{method:'POST',headers:hdrs(),
      body:JSON.stringify({displayname:dn,bio,avatar:newAvatar||me.avatar||null})});
    const d = await r.json(); if(!r.ok) throw new Error(d.error);
    me.displayname=dn; me.bio=bio; if(newAvatar) me.avatar=newAvatar;
    newAvatar=null;
    sessionStorage.setItem('wavr',JSON.stringify({me,token}));
    setAvEl(document.getElementById('my-av'), me.avatar, `av-lg av-online ${avc(me.username)}`, me.displayname);
    document.getElementById('my-dn').textContent=me.displayname;
    closeProfileModal();
  } catch(e){errEl.textContent=e.message;}
}

// USER PROFILE VIEW
async function openUserProfile() {
  if(!chatWith) return;
  try {
    const r = await fetch(`/api/profile/${chatWith.username}`,{headers:hdrs()});
    const d = await r.json();
    const u = d.user || chatWith;
    const av = document.getElementById('um-av');
    setAvEl(av, u.avatar, `av ${avc(u.username)}`, u.displayname);
    av.style.width='70px'; av.style.height='70px'; av.style.fontSize='24px'; av.style.margin='0 auto 14px';
    document.getElementById('um-dn').textContent = u.displayname || chatWith.displayname;
    document.getElementById('um-un').textContent = '@'+(u.username||chatWith.username);
    document.getElementById('um-bio').textContent = u.bio || '';
    document.getElementById('user-modal').style.display='flex';
  } catch(e){}
}
function closeUserModal(){ document.getElementById('user-modal').style.display='none'; }

let stid=null;
function onSearch(v){
  clearTimeout(stid);
  const el=document.getElementById('search-results');
  if(!v.trim()){el.style.display='none';el.innerHTML='';return;}
  stid=setTimeout(()=>doSearch(v),320);
}
async function doSearch(q){
  const el=document.getElementById('search-results');
  try{
    const r=await fetch(`/api/search?q=${encodeURIComponent(q)}`,{headers:hdrs()});
    const d=await r.json();
    if(!d.users||!d.users.length){el.style.display='block';el.innerHTML='<div style="padding:10px 14px;font-size:13px;color:var(--text3)">Не найдено</div>';return;}
    el.style.display='block';
    el.innerHTML=d.users.map(u=>`
      <div class="sr-item" onclick="openChat('${u.username}','${esc(u.displayname)}','${esc(u.avatar||'')}')">
        ${avHtml(u.avatar, `av ${avc(u.username)}`, u.username, u.displayname, '30px')}
        <div><div class="sr-name">${esc(u.displayname)}</div><div class="sr-tag">@${esc(u.username)}</div></div>
      </div>`).join('');
  }catch(e){}
}

async function loadChats(){
  try{
    const r=await fetch(`/api/chats`,{headers:hdrs()});
    const d=await r.json(); renderChats(d.chats||[]);
  }catch(e){}
}

function renderChats(list){
  const el=document.getElementById('chats-list');
  if(!list.length){el.innerHTML='<div class="empty-list">Найдите кого-нибудь через поиск 💬</div>';return;}
  el.innerHTML=list.map(c=>{
    const act=chatWith&&chatWith.username===c.otherUsername;
    return `<div class="chat-item ${act?'active':''}" onclick="openChat('${c.otherUsername}','${esc(c.otherDisplayname)}','${esc(c.otherAvatar||'')}')">
      ${avHtml(c.otherAvatar, `av ${avc(c.otherUsername)}`, c.otherUsername, c.otherDisplayname)}
      <div class="c-info"><div class="c-name">${esc(c.otherDisplayname)}</div><div class="c-preview">${esc(c.lastMessage||'')}</div></div>
      <div class="c-meta"><div class="c-time">${c.lastTs?ft(c.lastTs):''}</div>${c.unread?`<div class="badge">${c.unread}</div>`:''}</div>
      <button class="chat-del" onclick="event.stopPropagation();deleteChatFrom('${c.otherUsername}')" title="Удалить чат">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      </button>
    </div>`;
  }).join('');
}

async function openChat(username, displayname, avatar=''){
  document.getElementById('s-box').value='';
  document.getElementById('search-results').style.display='none';
  chatWith={username,displayname,avatar}; lastTs=0; seenIds=new Set();
  const tbav=document.getElementById('tb-av');
  setAvEl(tbav, avatar||null, `av ${avc(username)}`, displayname);
  document.getElementById('tb-name').textContent=displayname;
  document.getElementById('tb-status').textContent='@'+username;
  document.getElementById('no-chat').style.display='none';
  document.getElementById('chat-main').style.display='flex';
  document.getElementById('app').classList.add('chat-open');
  document.getElementById('msgs-area').innerHTML='<div style="text-align:center;padding:40px"><span class="spin" style="border-color:var(--border);border-top-color:var(--accent)"></span></div>';
  await fetchMsgs(true); loadChats();
}

function closeChat(){
  chatWith=null;
  document.getElementById('chat-main').style.display='none';
  document.getElementById('no-chat').style.display='flex';
  document.getElementById('app').classList.remove('chat-open');
}

async function fetchMsgs(full){
  if(!chatWith) return;
  try{
    const url=`/api/messages?b=${encodeURIComponent(chatWith.username)}${full?'':'&since='+lastTs}`;
    const r=await fetch(url,{headers:hdrs()}); const d=await r.json();
    const msgs=d.messages||[];
    if(msgs.length){ lastTs=msgs[msgs.length-1].ts; full?renderAll(msgs):appendMsgs(msgs); }
    else if(full) document.getElementById('msgs-area').innerHTML='<div class="empty-chat"><div class="empty-ico">👋</div><div>Начните переписку!</div></div>';
  }catch(e){}
}

function renderAll(msgs){
  const area=document.getElementById('msgs-area');
  let html='',lastD=null;
  for(const m of msgs){ const d=fd(m.ts); if(d!==lastD){html+=`<div class="day-sep">${d}</div>`;lastD=d;} html+=msgHtml(m); }
  area.innerHTML=html; area.scrollTop=area.scrollHeight;
}
function appendMsgs(msgs){
  msgs = msgs.filter(m => !seenIds.has(m.id));
  msgs.forEach(m => seenIds.add(m.id));
  const area=document.getElementById('msgs-area');
  const emp=area.querySelector('.empty-chat'); if(emp) emp.remove();
  msgs.forEach(m=>area.insertAdjacentHTML('beforeend',msgHtml(m)));
  area.scrollTop=area.scrollHeight;
}
function msgHtml(m){
  const isMe=m.from===me.username, ac=avc(m.from);
  const avEl = isMe
    ? avHtml(me.avatar, `msg-av ${ac}`, me.username, me.displayname)
    : avHtml(chatWith?.avatar||null, `msg-av ${ac}`, m.from, m.displayname||m.from);
  const delBtn = isMe && !m.deleted ? `<button class="msg-act-btn" onclick="deleteMsg(${m.id})" title="Удалить">
    <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
  </button>` : '';
  return `<div class="msg-wrap ${isMe?'me':''}" data-id="${m.id}">
    ${!isMe?avEl:''}
    ${isMe?`<div class="msg-actions">${delBtn}</div>`:''}
    <div><div class="bubble${m.deleted?' deleted':''}">${esc(m.text)}</div><div class="msg-time">${ft(m.ts)}</div></div>
    ${isMe?avEl:''}
    ${!isMe?`<div class="msg-actions">${delBtn}</div>`:''}
  </div>`;
}

async function deleteMsg(id) {
  if(!confirm('Удалить сообщение?')) return;
  try {
    const r = await fetch(`/api/message/${id}`,{method:'DELETE',headers:hdrs()});
    if(r.ok) { const el=document.querySelector(`[data-id="${id}"] .bubble`); if(el){el.textContent="Сообщение удалено";el.classList.add("deleted");} }
  } catch(e){}
}

async function deleteChat() {
  if(!chatWith) return;
  if(!confirm(`Удалить чат с ${chatWith.displayname}? Все сообщения будут удалены.`)) return;
  try {
    const r = await fetch(`/api/chat/${chatWith.username}`,{method:'DELETE',headers:hdrs()});
    if(r.ok){ closeChat(); await loadChats(); }
  } catch(e){}
}

async function deleteChatFrom(username) {
  if(!confirm('Удалить этот чат?')) return;
  try {
    const r = await fetch(`/api/chat/${username}`,{method:'DELETE',headers:hdrs()});
    if(r.ok){
      if(chatWith && chatWith.username===username) closeChat();
      await loadChats();
    }
  } catch(e){}
}

async function sendMsg(){
  if(!chatWith) return;
  const inp=document.getElementById('msg-in');
  const text=inp.value.trim(); if(!text) return;
  inp.value=''; inp.style.height='';
  try{
    await fetch('/api/send',{method:'POST',headers:hdrs(),body:JSON.stringify({to:chatWith.username,text})});
    await fetchMsgs(false); loadChats();
  }catch(e){}
}
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function autoH(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

const saved=sessionStorage.getItem('wavr');
if(saved){ const s=JSON.parse(saved); me=s.me; token=s.token; enterApp(); }
</script>
</body>
</html>
