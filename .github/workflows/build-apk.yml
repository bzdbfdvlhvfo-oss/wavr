name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || true
      - name: Install deps
        run: npm install
      - name: Add Android platform
        run: npx cap add android
      - name: Sync web
        run: npx cap copy
      - name: Build APK
        run: cd android && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wavr-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
