name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install deps
        run: npm install

      - name: Show cap version
        run: npx cap --version 2>&1 || echo "CAP_NOT_FOUND"

      - name: Init (if needed)
        run: npx cap init --web-dir public wavr com.wavr.messenger 2>&1 || true

      - name: List node_modules/.bin
        run: ls -la node_modules/.bin/ | head -20

      - name: Add Android platform
        run: npx cap add android 2>&1 || npx @capacitor/cli add android 2>&1

      - name: Sync web content
        run: npx cap copy

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wavr-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
